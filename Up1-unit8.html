<!doctype html>
<html lang="vi">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 8: The Toy Store</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
        body { font-family: 'DM Sans', system-ui, sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .option-btn { transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { transform: scale(1.02); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; }
        .incorrect { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .word-token { transition: all 0.15s; }
        .word-token:hover:not(:disabled) { transform: scale(1.05); }
        .progress-circle { transition: stroke-dashoffset 0.5s ease; }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen flex flex-col"><!-- Header -->
  <header class="w-full px-4 py-3 flex items-center justify-between text-white text-sm md:text-base flex-shrink-0 bg-indigo-600"><span class="font-medium">Trung tâm Anh ngữ LeeGo - Hotline: 0988.526.585</span> <span class="font-medium">Up 1 - Unit 8</span>
  </header><!-- Main Content -->
  <main class="flex-1 flex items-center justify-center p-4 overflow-y-auto"><!-- Cover Page -->
   <div id="cover-page" class="fade-in w-full max-w-md text-center space-y-6">
    <h1 class="text-3xl md:text-4xl font-bold text-indigo-900">Unit 8: The Toy Store</h1>
    <div class="space-y-3"><input id="password-input" type="password" placeholder="Enter password" class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl text-center text-lg focus:outline-none focus:border-blue-500">
     <p id="password-error" class="text-red-500 font-medium hidden">Mật khẩu chưa đúng.</p><button class="w-full py-3 rounded-xl text-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700" onclick="startQuiz()">Start Quiz</button>
    </div>
   </div><!-- Quiz Area -->
   <div id="quiz-area" class="hidden fade-in w-full max-w-2xl space-y-5"><!-- Progress -->
    <div class="space-y-2">
     <div class="flex justify-between text-sm font-medium text-gray-600"><span id="q-counter">Question 1 / 12</span> <span id="q-score"></span>
     </div>
     <div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden">
      <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-500 to-purple-500 rounded-full transition-all duration-500" style="width:0%"></div>
     </div>
    </div><!-- Question Content -->
    <div id="question-content" class="bg-white rounded-2xl shadow-lg p-5 md:p-8 space-y-4"></div><!-- Feedback -->
    <div id="feedback" class="hidden rounded-xl p-4 font-medium"></div><!-- Next Button --> <button id="next-btn" class="hidden w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-lg transition" onclick="nextQuestion()">Câu tiếp theo</button>
   </div><!-- Result Screen -->
   <div id="result-screen" class="hidden fade-in w-full max-w-md text-center space-y-6">
    <h2 class="text-3xl font-bold">🎉 Hoàn thành!</h2>
    <div class="relative inline-block">
     <svg width="160" height="160" class="transform -rotate-90"><circle cx="80" cy="80" r="70" stroke="#e5e7eb" stroke-width="12" fill="none" /> <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="440" stroke-dashoffset="440" class="progress-circle" />
     </svg>
     <div class="absolute inset-0 flex items-center justify-center"><span id="score-text" class="text-2xl font-bold text-gray-800"></span>
     </div>
    </div>
    <p id="score-percent" class="text-xl font-semibold text-gray-600"></p>
    <p id="score-comment" class="text-lg font-medium"></p><button class="w-full py-3 rounded-xl text-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700" onclick="resetQuiz()">Làm lại</button>
   </div>
  </main><!-- Footer -->
  <footer class="w-full px-4 py-3 flex items-center justify-between text-white text-sm md:text-base flex-shrink-0 bg-indigo-600"><span class="font-medium">Trung tâm Anh ngữ LeeGo - Hotline: 0988.526.585</span> <span class="font-medium">Up 1 - Unit 8</span>
  </footer>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    // Audio
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function getAudioCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

    function playCorrectSound() {
        const ctx = getAudioCtx(); const now = ctx.currentTime;
        [523.25, 659.25, 783.99].forEach((f, i) => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = f;
            g.gain.setValueAtTime(0.3, now + i*0.15);
            g.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.5);
            o.connect(g); g.connect(ctx.destination);
            o.start(now + i*0.15); o.stop(now + i*0.15 + 0.5);
        });
    }
    function playWrongSound() {
        const ctx = getAudioCtx(); const now = ctx.currentTime;
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = 'sawtooth'; o.frequency.value = 200;
        o.frequency.linearRampToValueAtTime(100, now + 0.4);
        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.5);
    }
    function playWinSound() {
        const ctx = getAudioCtx(); const now = ctx.currentTime;
        [523.25, 587.33, 659.25, 698.46, 783.99, 880, 987.77, 1046.5].forEach((f, i) => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = f;
            g.gain.setValueAtTime(0.25, now + i*0.15);
            g.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.6);
            o.connect(g); g.connect(ctx.destination);
            o.start(now + i*0.15); o.stop(now + i*0.15 + 0.6);
        });
    }

    // Questions data
    const questions = [
        // Part 1: Vocabulary
        { type:'mc', svg:'bus', question:'What\'s this?', options:['truck','bus','train','boat'], answer:1, explain:'Bus nghĩa là xe buýt.' },
        { type:'mc', svg:'train', question:'What\'s this?', options:['bus','truck','train','boat'], answer:2, explain:'Train nghĩa là tàu hỏa.' },
        { type:'mc', svg:'boat', question:'What\'s this?', options:['bus','truck','train','boat'], answer:3, explain:'Boat nghĩa là thuyền.' },
        { type:'mc', svg:'truck', question:'What\'s this?', options:['truck','bus','train','boat'], answer:0, explain:'Truck nghĩa là xe tải.' },
        // Part 2: Grammar - sentence building
        { type:'build', words:['that','is','an','old','bike','.'], answer:'That is an old bike.', explain:'Câu khẳng định với "that" + "is" + mạo từ + tính từ + danh từ.' },
        { type:'build', words:['those','are','new','bikes','.'], answer:'Those are new bikes.', explain:'Those đi với "are" và danh từ số nhiều.' },
        { type:'build', words:['is','that','a','fast','car','?'], answer:'Is that a fast car?', explain:'Câu hỏi Yes/No: đảo "is" lên đầu câu.' },
        { type:'build', words:['please','be','quiet','.'], answer:'Please be quiet.', explain:'Please = làm ơn, be = hãy/ở trạng thái, quiet = yên lặng.\nCả câu "Please be quiet." có nghĩa là "Làm ơn hãy giữ im lặng."' },
        // Part 3: Fill in the blank
        { type:'fill', sentence:'That\'s an ______ bike.', options:['fast','old','quiet','noisy'], answer:1, explain:'Đáp án đúng là old. Sau an phải là một từ bắt đầu bằng nguyên âm (a, e, i, o, u). Vì vậy ta dùng an old bike.\nAn old bike có nghĩa là một chiếc xe đạp cũ.' },
        { type:'mc', svg:'bus', question:'What\'s this?', options:['They\'re a bus.','It\'s a bus.','Those are buses.','These are buses.'], answer:1, explain:'Khi hỏi "What\'s this?" (Đây là gì?), ta trả lời bằng "It\'s + a/an + danh từ số ít."\nIt\'s a bus. nghĩa là Đây là một chiếc xe buýt.\nCác đáp án còn lại đều dùng đại từ hoặc cấu trúc không phù hợp với câu hỏi.' },
        { type:'fill', sentence:'A rabbit is ______.', options:['slow','fast','noisy','quiet'], answer:1, explain:'Đáp án đúng là fast vì rabbit (con thỏ) chạy rất nhanh. Fast có nghĩa là nhanh, còn slow nghĩa là chậm.' },
        { type:'mc', svg:'bus', question:'Are those new bikes?', options:['No, it isn\'t.','Yes, it is.','Yes, they are.','No, they are.'], answer:2, explain:'Câu hỏi bắt đầu bằng Are those... nên chủ ngữ là those (số nhiều). Khi trả lời phải dùng they.\nNếu đồng ý, ta trả lời "Yes, they are." (Đúng vậy, chúng là...).\nCác đáp án A và B dùng it nên sai chủ ngữ. Đáp án D "No, they are." sai ngữ pháp vì sau No phải là "they aren\'t."' },
    ];

    let current = 0, score = 0, answered = false;

    function startQuiz() {
        const pw = document.getElementById('password-input').value;
        if (pw !== '1379') { document.getElementById('password-error').classList.remove('hidden'); return; }
        document.getElementById('password-error').classList.add('hidden');
        document.getElementById('cover-page').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        current = 0; score = 0; answered = false;
        renderQuestion();
    }

    function renderQuestion() {
        answered = false;
        const q = questions[current];
        document.getElementById('q-counter').textContent = `Question ${current+1} / 12`;
        document.getElementById('progress-bar').style.width = `${(current/12)*100}%`;
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        const content = document.getElementById('question-content');
        content.classList.add('fade-in');
        setTimeout(() => content.classList.remove('fade-in'), 400);

        if (q.type === 'mc') renderMC(q, content);
        else if (q.type === 'build') renderBuild(q, content);
        else renderFill(q, content);
    }

    // SVG illustrations
    function getSVG(name) {
        const svgs = {
            bus: `<svg viewBox="0 0 200 120" class="w-48 h-32 mx-auto"><rect x="30" y="20" width="140" height="70" rx="10" fill="#FBBF24"/><rect x="45" y="30" width="30" height="25" rx="3" fill="#BFDBFE"/><rect x="85" y="30" width="30" height="25" rx="3" fill="#BFDBFE"/><rect x="125" y="30" width="30" height="25" rx="3" fill="#BFDBFE"/><circle cx="65" cy="95" r="12" fill="#374151"/><circle cx="135" cy="95" r="12" fill="#374151"/><rect x="30" y="60" width="140" height="5" fill="#F59E0B"/></svg>`,
            train: `<svg viewBox="0 0 200 120" class="w-48 h-32 mx-auto"><rect x="20" y="30" width="80" height="55" rx="8" fill="#3B82F6"/><rect x="100" y="40" width="40" height="45" rx="4" fill="#60A5FA"/><rect x="140" y="40" width="40" height="45" rx="4" fill="#60A5FA"/><rect x="30" y="40" width="25" height="20" rx="3" fill="#BFDBFE"/><circle cx="50" cy="92" r="10" fill="#374151"/><circle cx="120" cy="92" r="10" fill="#374151"/><circle cx="160" cy="92" r="10" fill="#374151"/><rect x="55" y="20" width="10" height="15" rx="3" fill="#6B7280"/></svg>`,
            boat: `<svg viewBox="0 0 200 120" class="w-48 h-32 mx-auto"><path d="M30 80 Q100 100 170 80 L160 60 H40 Z" fill="#F97316"/><rect x="95" y="25" width="6" height="40" fill="#78350F"/><path d="M101 25 L101 55 L140 45 Z" fill="#FBBF24"/><path d="M20 85 Q60 95 100 85 Q140 75 180 85" stroke="#3B82F6" stroke-width="3" fill="none"/><path d="M10 95 Q55 105 100 95 Q145 85 190 95" stroke="#93C5FD" stroke-width="2" fill="none"/></svg>`,
            truck: `<svg viewBox="0 0 200 120" class="w-48 h-32 mx-auto"><rect x="20" y="35" width="100" height="50" rx="4" fill="#EF4444"/><rect x="120" y="50" width="55" height="35" rx="6" fill="#DC2626"/><rect x="130" y="55" width="25" height="20" rx="3" fill="#BFDBFE"/><circle cx="55" cy="92" r="12" fill="#374151"/><circle cx="100" cy="92" r="12" fill="#374151"/><circle cx="150" cy="92" r="12" fill="#374151"/></svg>`
        };
        return svgs[name] || '';
    }

    function renderMC(q, el) {
        const svg = (q.svg && current < 11) ? getSVG(q.svg) : '';
        el.innerHTML = `
            ${svg}
            <p class="text-xl font-bold text-center text-gray-800">${q.question}</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="options">
                ${q.options.map((o,i) => `<button class="option-btn w-full p-3 border-2 border-gray-200 rounded-xl text-left font-medium text-gray-700 bg-gray-50 hover:border-blue-400" onclick="selectMC(${i})" id="opt-${i}">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
            </div>`;
    }

    function selectMC(idx) {
        if (answered) return;
        answered = true;
        const q = questions[current];
        const btns = document.querySelectorAll('#options .option-btn');
        btns.forEach(b => b.disabled = true);
        if (idx === q.answer) {
            score++; document.getElementById(`opt-${idx}`).classList.add('correct'); playCorrectSound();
            showFeedback(true, q.explain);
        } else {
            document.getElementById(`opt-${idx}`).classList.add('incorrect');
            document.getElementById(`opt-${q.answer}`).classList.add('correct'); playWrongSound();
            showFeedback(false, q.explain, q.options[q.answer]);
        }
    }

    function renderBuild(q, el) {
        const shuffled = [...q.words].sort(() => Math.random() - 0.5);
        el.innerHTML = `
            <p class="text-lg font-bold text-gray-800 text-center">Sắp xếp thành câu hoàn chỉnh:</p>
            <div id="sentence-area" class="min-h-[48px] p-3 border-2 border-dashed border-gray-300 rounded-xl flex flex-wrap gap-2 items-center bg-gray-50"></div>
            <div id="word-bank" class="flex flex-wrap gap-2 justify-center">
                ${shuffled.map((w,i) => `<button class="word-token px-3 py-2 bg-blue-100 border border-blue-300 rounded-lg font-medium text-blue-800 hover:bg-blue-200" onclick="pickWord(this,'${w.replace(/'/g,"\\'")}')">${w}</button>`).join('')}
            </div>
            <div class="flex gap-3 justify-center">
                <button class="px-5 py-2 bg-gray-200 rounded-lg font-medium hover:bg-gray-300" onclick="undoWord()">Undo</button>
                <button class="px-5 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700" onclick="checkBuild()">Check Answer</button>
            </div>`;
        window._buildWords = [];
    }

    function pickWord(btn, word) {
        if (answered) return;
        btn.classList.add('hidden');
        window._buildWords.push({ word, btn });
        renderSentenceArea();
    }
    function undoWord() {
        if (answered || !window._buildWords.length) return;
        const last = window._buildWords.pop();
        last.btn.classList.remove('hidden');
        renderSentenceArea();
    }
    function renderSentenceArea() {
        const area = document.getElementById('sentence-area');
        area.innerHTML = window._buildWords.map(w => `<span class="px-2 py-1 bg-blue-500 text-white rounded font-medium text-sm">${w.word}</span>`).join('');
    }
    function checkBuild() {
        if (answered) return;
        answered = true;
        const q = questions[current];
        // Build sentence with no space before punctuation
        let built = '';
        window._buildWords.forEach((w, i) => {
            if (i === 0) built = w.word;
            else if (/^[.,!?]$/.test(w.word)) built += w.word;
            else built += ' ' + w.word;
        });
        // Capitalize first letter for comparison
        const normalize = s => s.trim().toLowerCase();
        if (normalize(built) === normalize(q.answer)) {
            score++; playCorrectSound(); showFeedback(true, q.explain);
        } else {
            playWrongSound(); showFeedback(false, q.explain, q.answer);
        }
        // Disable word bank
        document.querySelectorAll('#word-bank .word-token').forEach(b => b.disabled = true);
    }

    function renderFill(q, el) {
        el.innerHTML = `
            <p class="text-xl font-bold text-center text-gray-800">${q.sentence}</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="options">
                ${q.options.map((o,i) => `<button class="option-btn w-full p-3 border-2 border-gray-200 rounded-xl text-left font-medium text-gray-700 bg-gray-50 hover:border-blue-400" onclick="selectMC(${i})" id="opt-${i}">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
            </div>`;
    }

    function showFeedback(correct, explain, correctAnswer) {
        const fb = document.getElementById('feedback');
        fb.classList.remove('hidden');
        if (correct) {
            fb.className = 'rounded-xl p-4 font-medium bg-green-50 border border-green-200 text-green-800';
            fb.innerHTML = `<p class="text-lg font-bold">✅ Chính xác!</p><p class="mt-1">${explain}</p>`;
        } else {
            fb.className = 'rounded-xl p-4 font-medium bg-red-50 border border-red-200 text-red-800';
            fb.innerHTML = `<p class="text-lg font-bold">❌ Chưa chính xác</p>${correctAnswer ? `<p class="mt-1">Đáp án đúng: <strong>${correctAnswer}</strong></p>` : ''}<p class="mt-1">${explain}</p>`;
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        current++;
        if (current >= 12) showResult();
        else renderQuestion();
    }

    function showResult() {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('fade-in');
        const pct = Math.round((score/12)*100);
        document.getElementById('score-text').textContent = `${score} / 12`;
        document.getElementById('score-percent').textContent = `${pct}%`;
        // Circle animation
        const circle = document.getElementById('score-circle');
        const offset = 440 - (440 * score / 12);
        setTimeout(() => circle.style.strokeDashoffset = offset, 100);
        // Comment
        let comment = 'Hãy luyện tập thêm nhé!';
        if (score === 12) comment = 'Xuất sắc! 🌟';
        else if (score >= 10) comment = 'Rất tốt! 👏';
        else if (score >= 8) comment = 'Khá tốt! 👍';
        document.getElementById('score-comment').textContent = comment;
        playWinSound();
    }

    function resetQuiz() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('fade-in');
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('cover-page').classList.remove('hidden');
        document.getElementById('password-input').value = '';
        document.getElementById('progress-bar').style.width = '0%';
        current = 0; score = 0; answered = false;
    }
    </script>
