 <head><script src="/_sdk/telemetry_sdk.js"></script>

 </head>
 <body data-template-id="__page-root" class="min-h-screen flex flex-col bg-gradient-to-br from-yellow-100 via-pink-50 to-blue-100">
  <header data-template-id="header-bar" class="canva-header fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-4 py-2 text-xs sm:text-sm shadow-md"><span data-template-id="header-left" class="canva-text font-medium">Trung tâm Anh ngữ LeeGo - Hotline: 0988.526.585</span> <span data-template-id="header-right" class="canva-text font-medium">Up 3 - Unit 1</span>

  <main class="flex-1 pt-12 pb-12 flex flex-col items-center justify-center w-full"><!-- Quiz Container -->

     <div id="progress-fill" class="h-full bg-gradient-to-r from-green-400 to-blue-500 transition-all duration-300" style="width:0%"></div>

   </div>

  </footer>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
// Auto-start quiz on page load
window.addEventListener('load', startQuiz);

const questions = [
    // Q1-5: Vocabulary
    { type:'vocab', svg:'soda', question:'What is this?', options:['carrot','soda','peanut','cabbage'], correct:1, explanation:'"Soda" nghĩa là nước ngọt có ga. Hình minh họa là một lon nước ngọt.' },
    { type:'vocab', svg:'carrot', question:'What is this?', options:['onion','potato','carrot','pepper'], correct:2, explanation:'"Carrot" nghĩa là cà rốt.' },
    { type:'vocab', svg:'tomato', question:'What is this?', options:['peanuts','popcorn','tomato','onion'], correct:2, explanation:'"Tomato" nghĩa là cà chua. Đây là một quả cà chua đỏ.' },
    { type:'hint', hint:'You eat it at the cinema.', question:'What is it?', options:['soda','popcorn','cabbage','milkshake'], correct:1, explanation:'"Popcorn" là bỏng ngô. Chúng ta thường ăn bỏng ngô khi xem phim.' },
    { type:'hint', hint:'It is a drink made with milk and ice cream.', question:'What is it?', options:['omelet','fruit salad','milkshake','potato chips'], correct:2, explanation:'"Milkshake" là đồ uống được làm từ sữa và kem.' },
    // Q6-10: Drag and drop
    { type:'drag', words:['some','I','popcorn','want'], punct:'.', correct:'I want some popcorn.', explanation:'"I want some popcorn." nghĩa là "Tôi muốn một ít bỏng ngô."\n\nCấu trúc: I + want + some + noun\nTrong câu khẳng định thường dùng "some".' },
    { type:'drag', words:['some','He','soda','wants'], punct:'.', correct:'He wants some soda.', explanation:'"He wants some soda." nghĩa là "Cậu ấy muốn một ít nước ngọt."\n\nVới He/She, động từ thêm -s: want → wants' },
    { type:'drag', words:['carrots','you','need','Do','any'], punct:'?', correct:'Do you need any carrots?', explanation:'Đây là câu hỏi.\nTrong câu hỏi thường dùng "any".\nMẫu: Do + subject + verb + any + noun?' },
    { type:'drag', words:['doesn\'t','She','peanuts','want','any'], punct:'.', correct:'She doesn\'t want any peanuts.', explanation:'Đây là câu phủ định.\nTrong câu phủ định thường dùng "any".' },
    { type:'drag', words:['need','they','What','do'], punct:'?', correct:'What do they need?', explanation:'"What do they need?" nghĩa là "Họ cần gì?"' },
    // Q11-15: Cloze
    { type:'cloze', blank:11, options:['popcorn','onion','cabbage','pepper'], correct:0, explanation:'Tom đói nên muốn ăn popcorn.' },
    { type:'cloze', blank:12, options:['potatoes','omelet','vegetables','milkshake'], correct:1, explanation:'Câu hỏi số 12 cần dùng một danh từ đi với "an". Đáp án "omelet" là phù hợp nhất. "Omelet" nghĩa là "trứng tráng".' },
    { type:'cloze', blank:13, options:['carrots','soda','chocolate','popcorn'], correct:0, explanation:'Carrots là rau củ nên phù hợp với người thích rau.' },
    { type:'cloze', blank:14, options:['carrots','peanuts','soda','potatoes'], correct:2, explanation:'Không khát nước nên không muốn uống soda.' },
    { type:'cloze', blank:15, options:['onion','milkshake','cabbage','pepper'], correct:1, explanation:'Milkshake là đồ uống phù hợp sau bữa ăn.' },
];

const clozePassage = `Tom is hungry. He wants some <strong>(11) ______</strong>.\n\nFor lunch, he has a salad and an <strong>(12) ______</strong>.\n\nHis sister wants some <strong>(13) ______</strong> because she likes vegetables.\n\nThey do not want any <strong>(14) ______</strong> because they are not thirsty.\n\nAfter lunch, they drink a delicious <strong>(15) ______</strong>.`;

let currentQ = 0, score = 0, answers = [], audioCtx = null;

// Initialize audio context on first user interaction
async function initAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
}

// Set up one-time audio unlock on first page click
document.addEventListener('click', initAudioContext, { once: true });


function getSVG(type) {
    if (type === 'soda') return `<svg viewBox="0 0 100 140" width="120" height="160"><rect x="25" y="20" width="50" height="100" rx="8" fill="#e63946"/><rect x="30" y="10" width="40" height="15" rx="4" fill="#adb5bd"/><rect x="25" y="50" width="50" height="30" rx="0" fill="#fff" opacity="0.3"/><text x="50" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">SODA</text><ellipse cx="50" cy="120" rx="25" ry="4" fill="#c1121f"/></svg>`;
    if (type === 'tomato') return `<svg viewBox="0 0 100 120" width="120" height="160"><defs><radialGradient id="tomatoGrad" cx="35%" cy="35%"><stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" /><stop offset="100%" style="stop-color:#d62828;stop-opacity:1" /></radialGradient></defs><circle cx="50" cy="65" r="42" fill="url(#tomatoGrad)" stroke="#c1121f" stroke-width="2"/><circle cx="38" cy="50" r="12" fill="#ff9999" opacity="0.6"/><circle cx="62" cy="55" r="10" fill="#ff9999" opacity="0.6"/><g id="stem"><rect x="48" y="15" width="4" height="25" rx="2" fill="#2d6a4f"/><ellipse cx="48" cy="18" rx="8" ry="6" fill="#40916c"/><ellipse cx="52" cy="20" rx="7" ry="5" fill="#40916c"/><ellipse cx="50" cy="23" rx="6" ry="4" fill="#40916c"/></g><ellipse cx="50" cy="107" rx="35" ry="8" fill="#000000" opacity="0.15"/></svg>`;
    if (type === 'carrot') return `<svg viewBox="0 0 100 140" width="120" height="160"><path d="M50 130 L35 50 Q50 40 65 50 Z" fill="#f77f00"/><path d="M45 50 Q50 20 55 50" fill="#2d6a4f"/><path d="M40 55 Q35 25 50 45" fill="#40916c"/><path d="M60 55 Q65 25 50 45" fill="#40916c"/><line x1="42" y1="70" x2="58" y2="70" stroke="#e76f51" stroke-width="1.5"/><line x1="44" y1="85" x2="56" y2="85" stroke="#e76f51" stroke-width="1.5"/><line x1="46" y1="100" x2="54" y2="100" stroke="#e76f51" stroke-width="1.5"/></svg>`;
    if (type === 'onions') return `<svg viewBox="0 0 140 140" width="120" height="160"><g id="onion1"><circle cx="45" cy="70" r="28" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="2"/><circle cx="35" cy="60" r="8" fill="#e8e8e8"/><circle cx="55" cy="60" r="8" fill="#e8e8e8"/><path d="M45 40 Q40 30 45 15 Q50 30 45 40" fill="#2d6a4f" stroke="#1d5a3a" stroke-width="1.5"/><line x1="45" y1="98" x2="45" y2="120" stroke="#d4d4d4" stroke-width="2"/></g><g id="onion2"><circle cx="100" cy="75" r="28" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="2"/><circle cx="90" cy="65" r="8" fill="#e8e8e8"/><circle cx="110" cy="65" r="8" fill="#e8e8e8"/><path d="M100" y="45" Q95 y="35" 100 y="20" Q105 y="35" 100 y="45" fill="#2d6a4f" stroke="#1d5a3a" stroke-width="1.5"/><line x1="100" y1="103" x2="100" y2="125" stroke="#d4d4d4" stroke-width="2"/></g></svg>`;
    return '';
}

function playSound(success) {
    if (!audioCtx) return; // Ensure audio context is initialized
    if (success) {
        const frequencies = [523.25, 587.33, 659.25, 783.99, 880, 987.77];
        frequencies.forEach((f, i) => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = f;
            g.gain.setValueAtTime(0.25, audioCtx.currentTime + i*0.3);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.3 + 0.55);
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start(audioCtx.currentTime + i*0.3);
            o.stop(audioCtx.currentTime + i*0.3 + 0.55);
        });
    } else {
        const frequencies = [440, 392, 349.23, 329.63, 293.66];
        frequencies.forEach((f, i) => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = f;
            g.gain.setValueAtTime(0.2, audioCtx.currentTime + i*0.36);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.36 + 0.55);
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start(audioCtx.currentTime + i*0.36);
            o.stop(audioCtx.currentTime + i*0.36 + 0.55);
        });
    }
}

function playCelebration() {
    if (!audioCtx) return; // Ensure audio context is initialized
    const sequence = [
        { f: 523.25, duration: 0.4 },
        { f: 587.33, duration: 0.4 },
        { f: 659.25, duration: 0.4 },
        { f: 783.99, duration: 0.4 },
        { f: 880, duration: 0.4 },
        { f: 987.77, duration: 0.4 },
        { f: 1046.5, duration: 0.4 },
        { f: 1174.66, duration: 0.6 }
    ];
    let time = 0;
    sequence.forEach(note => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = note.f;
        g.gain.setValueAtTime(0.2, audioCtx.currentTime + time);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + note.duration);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start(audioCtx.currentTime + time);
        o.stop(audioCtx.currentTime + time + note.duration);
        time += note.duration;
    });
}

async function startQuiz() {
    // Unlock audio on mobile before playing any sounds
    await initAudioContext();
    document.getElementById('quiz-container').classList.add('active');
    currentQ = 0; score = 0; answers = [];
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentQ];
    const area = document.getElementById('question-area');
    document.getElementById('feedback-area').classList.add('hidden');
    document.getElementById('progress-fill').style.width = ((currentQ+1)/15*100)+'%';
    let html = `<p class="text-sm font-bold text-blue-600 mb-2">Câu ${currentQ+1}/15</p>`;

    if (q.type === 'vocab') {
        html += `<div class="flex justify-center mb-4">${getSVG(q.svg)}</div>`;
        html += `<p class="text-xl font-bold text-center mb-4">${q.question}</p>`;
        html += renderOptions(q);
    } else if (q.type === 'hint') {
        html += `<div class="bg-amber-50 border-2 border-amber-300 rounded-xl p-4 mb-4 text-center"><p class="text-sm font-bold text-amber-700">💡 Hint:</p><p class="text-lg font-medium text-amber-900">"${q.hint}"</p></div>`;
        html += `<p class="text-xl font-bold text-center mb-4">${q.question}</p>`;
        html += renderOptions(q);
    } else if (q.type === 'drag') {
        html += `<p class="text-lg font-bold mb-4">Click words to build the sentence.</p>`;
        const shuffled = [...q.words].sort(() => Math.random() - 0.5);
        
        // Answer bar
        html += `<div class="w-full bg-white border-2 border-dashed border-blue-400 rounded-xl p-6 mb-6 min-h-[100px] flex flex-wrap items-center gap-3 content-start">`;
        html += `<div id="answer-bar" class="w-full flex flex-wrap items-center gap-3 min-h-[50px]">`;
        html += `<span class="text-3xl font-bold text-blue-600">${q.punct === '.' ? '.' : '?'}</span>`;
        html += `</div></div>`;
        
        // Word bank
        html += `<p class="text-base font-semibold mb-2 text-gray-700">Words:</p>`;
        html += `<div id="word-bank" class="flex flex-wrap gap-3 mb-6 p-4 bg-gray-50 rounded-lg min-h-[60px]">`;
        shuffled.forEach((w, i) => {
            html += `<button type="button" class="word-card bg-gradient-to-br from-blue-500 to-blue-600 text-white px-5 py-3 rounded-lg font-bold text-base sm:text-lg hover:shadow-lg hover:scale-105 transition-all active:scale-95" data-word="${w}" data-index="${i}">${w}</button>`;
        });
        html += `</div>`;
        
        html += `<button type="button" onclick="checkClickBuild()" class="mt-3 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition">Kiểm tra</button>`;
    } else if (q.type === 'cloze') {
        html += `<p class="text-lg font-bold mb-3">Read the text and choose the best answer for each blank.</p>`;
        html += `<div class="bg-blue-50 border-2 border-blue-200 rounded-xl p-4 mb-4 text-base leading-relaxed whitespace-pre-line">${clozePassage}</div>`;
        html += `<p class="text-lg font-bold mb-3">Blank (${q.blank}):</p>`;
        html += renderOptions(q);
    }
    area.innerHTML = html;
    area.classList.add('fade-in');
    if (q.type === 'drag') setupClickBuild();
}

function renderOptions(q) {
    const letters = ['A','B','C','D'];
    return `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${q.options.map((o,i) => `<button class="option-btn bg-white border-2 border-gray-200 rounded-xl px-4 py-3 text-left text-lg font-medium hover:border-blue-400" onclick="checkAnswer(${i})">${letters[i]}. ${o}</button>`).join('')}</div>`;
}

function checkAnswer(idx) {
    const q = questions[currentQ];
    const correct = idx === q.correct;
    if (correct) score++;
    answers.push({ num: currentQ+1, student: q.options[idx], correct_ans: q.options[q.correct], result: correct });
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach((b,i) => { b.disabled = true; if (i===q.correct) b.classList.add('correct'); if (i===idx && !correct) b.classList.add('incorrect'); });
    showFeedback(correct, q.explanation);
}

function setupClickBuild() {
    const q = questions[currentQ];
    const answerBar = document.getElementById('answer-bar');
    const wordBank = document.getElementById('word-bank');
    let selectedWords = [];
    const wordData = {};
    
    // Store original word positions
    document.querySelectorAll('.word-card').forEach(card => {
        wordData[card.dataset.word] = {
            element: card,
            index: parseInt(card.dataset.index)
        };
    });
    
    document.querySelectorAll('.word-card').forEach(card => {
        card.addEventListener('click', () => {
            const word = card.dataset.word;
            const index = selectedWords.indexOf(word);
            
            if (index > -1) {
                // Word is already selected - remove it
                selectedWords.splice(index, 1);
                // Re-add to word bank
                wordBank.appendChild(card);
            } else {
                // Word not selected - add it
                selectedWords.push(word);
                // Move to answer bar (before punctuation)
                const punctuationSpan = answerBar.querySelector('.text-3xl');
                answerBar.insertBefore(card, punctuationSpan);
            }
        });
    });
}

function checkClickBuild() {
    const q = questions[currentQ];
    const answerBar = document.getElementById('answer-bar');
    const selectedCards = answerBar.querySelectorAll('.word-card');
    
    if (selectedCards.length !== q.words.length) {
        const msg = document.createElement('div');
        msg.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-yellow-100 border-2 border-yellow-400 rounded-lg p-6 text-center shadow-lg z-50';
        msg.innerHTML = `<p class="text-lg font-bold text-yellow-800">⚠ Please use all words before checking.</p><button onclick="this.parentElement.remove()" class="mt-3 px-4 py-2 bg-yellow-500 text-white rounded font-bold hover:bg-yellow-600">OK</button>`;
        document.body.appendChild(msg);
        return;
    }
    
    const words = [];
    selectedCards.forEach(card => {
        words.push(card.dataset.word);
    });
    
    const userAnswer = words.join(' ').trim() + q.punct;
    const correct = userAnswer === q.correct;
    if (correct) score++;
    answers.push({ num: currentQ+1, student: userAnswer, correct_ans: q.correct, result: correct });
    showFeedback(correct, q.explanation);
}

function showFeedback(correct, explanation) {
    playSound(correct);
    const fb = document.getElementById('feedback-area');
    fb.classList.remove('hidden');
    fb.innerHTML = `<div class="fade-in rounded-xl p-5 mt-3 ${correct ? 'bg-green-50 border-2 border-green-300' : 'bg-red-50 border-2 border-red-300'}"><p class="text-xl font-bold mb-2">${correct ? '✅ Chính xác' : '❌ Chưa chính xác'}</p><p class="text-base whitespace-pre-line">${explanation}</p><button onclick="nextQuestion()" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition">Tiếp tục</button></div>`;
}

function nextQuestion() {
    currentQ++;
    if (currentQ >= 15) showResults();
    else renderQuestion();
}

function showResults() {
    document.getElementById('quiz-container').classList.remove('active');
    document.getElementById('results').classList.add('active');
    document.getElementById('progress-fill').style.width = '100%';
    playCelebration();
    const pct = Math.round(score/15*100);
    let msg = '💪 Hãy luyện tập lại!';
    if (score === 15) msg = '🌟 Xuất sắc!';
    else if (score >= 13) msg = '🎉 Rất tốt!';
    else if (score >= 10) msg = '👍 Tốt!';
    else if (score >= 7) msg = '🙂 Cố gắng thêm nhé!';

    let html = `<h2 class="text-2xl sm:text-3xl font-black mb-4">🎉 HOÀN THÀNH BÀI LUYỆN TẬP 🎉</h2>`;
    html += `<p class="text-4xl font-black text-blue-600 mb-2">${score} / 15</p>`;
    html += `<p class="text-lg text-gray-600 mb-2">${pct}%</p>`;
    html += `<p class="text-2xl mb-6">${msg}</p>`;
    html += `<div class="overflow-x-auto"><table class="w-full text-sm border-collapse"><thead><tr class="bg-blue-100"><th class="p-2 border">Câu</th><th class="p-2 border">Bạn chọn</th><th class="p-2 border">Đáp án</th><th class="p-2 border">Kết quả</th></tr></thead><tbody>`;
    answers.forEach(a => {
        html += `<tr class="${a.result?'bg-green-50':'bg-red-50'}"><td class="p-2 border text-center">${a.num}</td><td class="p-2 border">${a.student}</td><td class="p-2 border">${a.correct_ans}</td><td class="p-2 border text-center">${a.result?'✔':'✘'}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    html += `<div class="flex gap-3 mt-6 justify-center flex-wrap"><button onclick="startQuiz();document.getElementById('results').classList.remove('active');document.getElementById('quiz-container').classList.add('active');" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-lg hover:bg-blue-700">🔄 Làm lại</button><button onclick="location.reload()" class="bg-gray-200 text-gray-800 px-6 py-3 rounded-xl font-bold text-lg hover:bg-gray-300">🏠 Về trang chủ</button></div>`;
    document.getElementById('results-content').innerHTML = html;
