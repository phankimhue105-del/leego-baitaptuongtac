<!doctype html>
<html lang="vi">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Up 3 - Unit 2: Around Town Quiz</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; }
        .word-token { transition: all 0.2s; }
        .word-token:hover { transform: translateY(-2px); }
        .word-token.used { opacity: 0.4; pointer-events: none; }
        .option-item { transition: all 0.2s; }
        .option-item:hover:not([disabled]) { border-color: #0066cc; background-color: #e3f2fd; }
        .option-item.correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .option-item.incorrect { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .feedback-pop { animation: pop 0.3s ease; }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen flex flex-col">
  <header data-template-id="header-bar" class="canva-header flex justify-between items-center px-5 py-3 text-white text-sm font-bold border-b-4 border-yellow-500 shadow-md z-10">
   <span data-template-id="header-brand" class="canva-text"></span> <span data-template-id="header-unit" class="canva-text"></span>
  </header>
  <main class="flex-1 flex justify-center items-center p-5">
   <div class="bg-white rounded-2xl shadow-xl w-full max-w-[700px] p-7 border-2 border-gray-200">
    <div id="quiz-flow">
     <div class="flex justify-between items-center mb-4">
      <span data-template-id="section-badge" class="canva-tag px-4 py-1.5 rounded-full text-sm font-bold" id="section-lbl"></span> <span class="text-gray-500 font-bold text-sm" id="progress-lbl"></span>
     </div>
     <div id="reading-box" class="bg-gray-50 border-l-4 border-blue-600 p-4 mb-5 rounded text-base leading-relaxed italic hidden"></div>
     <div id="svg-box" class="text-center my-4 bg-gray-50 rounded-xl p-4 border border-dashed border-gray-300 hidden"></div>
     <h2 class="text-lg font-bold mb-5 text-gray-900" id="question-lbl"></h2>
     <div id="unscramble-container" class="hidden">
      <div id="answer-slots" class="flex flex-wrap gap-2.5 mb-4 min-h-[60px] p-3 border-2 border-dashed border-blue-600 bg-white rounded-lg items-center cursor-pointer"></div>
      <p class="text-xs text-gray-500 mb-2">*Nhấp lần lượt các từ bên dưới để xếp thành câu hoàn chỉnh:</p>
      <div id="word-bank" class="flex flex-wrap gap-2.5 mb-5 min-h-[50px] p-3 bg-gray-100 rounded-lg items-center"></div>
     </div>
     <div id="options-box" class="flex flex-col gap-3 mb-5"></div>
     <div id="feedback-alert" class="hidden p-4 rounded-xl mb-5 feedback-pop">
      <div class="text-lg font-bold mb-1" id="feedback-txt"></div>
      <div class="text-sm mt-2 border-t border-dashed border-black/10 pt-2" id="explain-txt"></div>
     </div><button id="submit-btn" class="hidden w-full bg-blue-600 hover:bg-blue-800 text-white font-bold py-4 rounded-xl text-base cursor-pointer" onclick="checkUnscramble()">Xác nhận đáp án</button> <button id="next-btn" class="hidden w-full bg-blue-600 hover:bg-blue-800 text-white font-bold py-4 rounded-xl text-base cursor-pointer" onclick="goNext()">Câu tiếp theo</button>
    </div>
    <div id="result-flow" class="hidden text-center py-8">
     <h2 data-template-id="result-title" class="canva-text text-3xl font-bold mb-4"></h2>
     <div class="text-5xl font-bold text-yellow-500 mb-6" id="score-lbl"></div>
     <p class="text-lg mb-8 leading-relaxed" id="result-text"></p><button data-template-id="reset-btn" class="canva-button font-bold py-4 px-8 rounded-xl text-base cursor-pointer" onclick="resetQuiz()"></button>
    </div>
   </div>
  </main>
  <footer data-template-id="footer-bar" class="canva-footer flex justify-between items-center px-5 py-3 text-white text-sm font-bold border-t-4 border-yellow-500 mt-auto z-10">
   <span data-template-id="footer-brand" class="canva-text"></span> <span data-template-id="footer-unit" class="canva-text"></span>
  </footer>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
        function playAudio(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                let time = ctx.currentTime;
                if (type === 'good') {
                    [523.25,659.25,783.99,1046.50].forEach((f,i) => {
                        let o=ctx.createOscillator(),g=ctx.createGain();
                        o.type='sine';o.frequency.setValueAtTime(f,time+i*0.08);
                        g.gain.setValueAtTime(0.15,time+i*0.08);g.gain.exponentialRampToValueAtTime(0.01,time+i*0.08+0.3);
                        o.connect(g);g.connect(ctx.destination);o.start(time+i*0.08);o.stop(time+i*0.08+0.3);
                    });
                } else if (type === 'bad') {
                    let o=ctx.createOscillator(),g=ctx.createGain();
                    o.type='sawtooth';o.frequency.setValueAtTime(120,time);o.frequency.linearRampToValueAtTime(80,time+0.3);
                    g.gain.setValueAtTime(0.2,time);g.gain.exponentialRampToValueAtTime(0.01,time+0.3);
                    o.connect(g);g.connect(ctx.destination);o.start(time);o.stop(time+0.3);
                } else if (type === 'win') {
                    [392,523.25,659.25,783.99].forEach(f => {
                        let o=ctx.createOscillator(),g=ctx.createGain();
                        o.type='triangle';o.frequency.setValueAtTime(f,time);o.frequency.setValueAtTime(f*1.2,time+0.2);
                        g.gain.setValueAtTime(0.1,time);g.gain.exponentialRampToValueAtTime(0.01,time+0.7);
                        o.connect(g);g.connect(ctx.destination);o.start(time);o.stop(time+0.7);
                    });
                }
            } catch(e){}
        }

        const acrossFromSVG=`<svg width="120" height="120" viewBox="0 0 120 100"><line x1="60" y1="10" x2="60" y2="90" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/><rect x="10" y="40" width="35" height="35" fill="#ff9800" stroke="#e65100" stroke-width="2"/><text x="27.5" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">BANK</text><path d="M75,65 L95,55 L95,75 Z" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/><text x="85" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">PARK</text></svg>`;

        const betweenSVG=`<svg width="120" height="120" viewBox="0 0 120 100"><rect x="10" y="40" width="30" height="30" fill="#ff6b6b" stroke="#c92a2a" stroke-width="2"/><text x="25" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">BOX</text><circle cx="60" cy="55" r="15" fill="#ffd93d" stroke="#f0a500" stroke-width="2"/><text x="60" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BALL</text><rect x="80" y="40" width="30" height="30" fill="#4d96ff" stroke="#1971c2" stroke-width="2"/><text x="95" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">BOX</text></svg>`;

        const dataset=[
            {type:"choice",sec:"Phần 1: Từ vựng",question:"Look at the picture. Where is the bank? It's _______ the park.",svg:acrossFromSVG,options:["between","in","on","across from"],correct:3,exp:'"Across from" nghĩa là đối diện, ở phía bên kia.'},
            {type:"choice",sec:"Phần 1: Từ vựng",question:"You go to this place to watch a movie. What is it?",options:["department store","library","movie theater","park"],correct:2,exp:'"Movie theater" nghĩa là rạp chiếu phim.'},
            {type:"choice",sec:"Phần 1: Từ vựng",question:"You go to this place to borrow books. What is it?",options:["library","supermarket","post office","park"],correct:0,exp:'"Library" nghĩa là thư viện.'},
            {type:"choice",sec:"Phần 1: Từ vựng",question:"Look at the picture. Where is the ball? It's _______ two boxes.",svg:betweenSVG,options:["across from","under","on","between"],correct:3,exp:'"Between" là ở giữa. Quả bóng nằm ở giữa 2 cái hộp.'},
            {type:"choice",sec:"Phần 1: Từ vựng",question:"You go to the supermarket to buy _______. What is the missing word?",options:["books","letters","movies","groceries"],correct:3,exp:'"Groceries" có nghĩa là thực phẩm/tạp hóa. Cụm từ "buy groceries" nghĩa là mua thực phẩm ở siêu thị.'},
            {type:"drag",sec:"Phần 2: Cấu trúc",question:"Put the words in order:",words:["Where's","the","park?"],correctStr:"Where's the park?",exp:'Question: "Where\'s + the + place?" (Địa điểm .... ở đâu?)'},
            {type:"drag",sec:"Phần 2: Cấu trúc",question:"Put the words in order:",words:["It's","across","from","the","movie","theater."],correctStr:"It's across from the movie theater.",exp:'"Across from" = opposite (Đối diện với...)'},
            {type:"drag",sec:"Phần 2: Cấu trúc",question:"Put the words in order:",words:["What's","she","doing","at","the","supermarket?"],correctStr:"What's she doing at the supermarket?",exp:'Present continuous: "What\'s + S + doing + at + place?" (hỏi ai đó đang làm gì ở địa điểm .... ?)'},
            {type:"drag",sec:"Phần 2: Cấu trúc",question:"Put the words in order:",words:["They're","shopping."],correctStr:"They're shopping.",exp:'Present continuous: S + am/is/are + V-ing. "They\'re shopping" = Họ đang mua sắm'},
            {type:"drag",sec:"Phần 2: Cấu trúc",question:"Put the words in order:",words:["Excuse","me.","Where's","the","post","office?"],correctStr:"Excuse me. Where's the post office?",exp:'"Excuse me" + question (Xin lỗi, Địa điểm .... ở đâu?)'},
            {type:"choice",sec:"Phần 3: Bài đọc",reading:"Welcome to my town. Look! The park is (11)______ the school and the library. My friends are at the park. What are they doing? They are (12)______ a ball. I want to go to the (13)______ to buy groceries. Wait, where is it? Ah, it's (14)______ from the post office. Let's go there! (15)______, cross the street carefully.",question:"Fill the blank (11). The park is _______ the school and the library.",options:["across from","between","on","next to"],correct:1,exp:'"Between" = between two places (Ở giữa 2 nơi)'},
            {type:"choice",sec:"Phần 3: Bài đọc",reading:"Welcome to my town. Look! The park is (11)______ the school and the library. My friends are at the park. What are they doing? They are (12)______ a ball. I want to go to the (13)______ to buy groceries. Wait, where is it? Ah, it's (14)______ from the post office. Let's go there! (15)______, cross the street carefully.",question:"Fill the blank (12). They are _______ a ball.",options:["shopping","mailing","borrowing","kicking"],correct:3,exp:'"Kicking a ball" = đá bóng (V-ing = hành động đang xảy ra)'},
            {type:"choice",sec:"Phần 3: Bài đọc",reading:"Welcome to my town. Look! The park is (11)______ the school and the library. My friends are at the park. What are they doing? They are (12)______ a ball. I want to go to the (13)______ to buy groceries. Wait, where is it? Ah, it's (14)______ from the post office. Let's go there! (15)______, cross the street carefully.",question:"Fill the blank (13). I want to go to the _______ to buy groceries.",options:["supermarket","library","movie theater","post office"],correct:0,exp:'"Supermarket" = siêu thị (nơi mua thực phẩm)'},
            {type:"choice",sec:"Phần 3: Bài đọc",reading:"Welcome to my town. Look! The park is (11)______ the school and the library. My friends are at the park. What are they doing? They are (12)______ a ball. I want to go to the (13)______ to buy groceries. Wait, where is it? Ah, it's (14)______ from the post office. Let's go there! (15)______, cross the street carefully.",question:"Fill the blank (14). It's _______ from the post office.",options:["between","on","across","under"],correct:2,exp:'"Across from" = đối diện (opposite side)'},
            {type:"choice",sec:"Phần 3: Bài đọc",reading:"Welcome to my town. Look! The park is (11)______ the school and the library. My friends are at the park. What are they doing? They are (12)______ a ball. I want to go to the (13)______ to buy groceries. Wait, where is it? Ah, it's (14)______ from the post office. Let's go there! (15)______, cross the street carefully.",question:"Fill the blank (15). _______ cross the street carefully.",options:["First","Then","Next","After"],correct:0,exp:'"First" = đầu tiên (thứ tự hành động)'}
        ];

        let currentIdx=0,totalScore=0,currentSelection=[],isReviewed=false;

        function loadQuestion(){
            isReviewed=false;currentSelection=[];
            document.getElementById("feedback-alert").classList.add("hidden");
            document.getElementById("next-btn").classList.add("hidden");
            document.getElementById("submit-btn").classList.add("hidden");
            let q=dataset[currentIdx];
            document.getElementById("section-lbl").textContent=q.sec;
            document.getElementById("progress-lbl").textContent=`Câu ${currentIdx+1}/15`;
            document.getElementById("question-lbl").textContent=q.question;
            document.getElementById("explain-txt").textContent=q.exp;
            let rBox=document.getElementById("reading-box");
            if(q.reading){rBox.textContent=q.reading;rBox.classList.remove("hidden");}else{rBox.classList.add("hidden");}
            let sBox=document.getElementById("svg-box");
            if(q.svg){sBox.innerHTML=q.svg;sBox.classList.remove("hidden");}else{sBox.classList.add("hidden");}
            if(q.type==="choice"){
                document.getElementById("unscramble-container").classList.add("hidden");
                let oBox=document.getElementById("options-box");oBox.style.display="flex";oBox.innerHTML="";
                q.options.forEach((opt,idx)=>{
                    let btn=document.createElement("button");btn.className="option-item bg-white border-2 border-gray-300 rounded-xl py-3.5 px-5 text-base text-left cursor-pointer font-medium";
                    btn.textContent=`${String.fromCharCode(65+idx)}. ${opt}`;
                    btn.onclick=()=>evalChoice(idx,btn);oBox.appendChild(btn);
                });
            } else {
                document.getElementById("options-box").style.display="none";
                document.getElementById("unscramble-container").classList.remove("hidden");
                document.getElementById("submit-btn").classList.remove("hidden");
                document.getElementById("answer-slots").innerHTML="";
                let bank=document.getElementById("word-bank");bank.innerHTML="";
                [...q.words].sort(()=>Math.random()-0.5).forEach(w=>{
                    let t=document.createElement("span");t.className="word-token bg-blue-100 border-2 border-blue-400 text-blue-900 px-4 py-2 rounded-lg font-bold cursor-pointer select-none";
                    t.textContent=w;t.onclick=()=>appendWord(t,w);bank.appendChild(t);
                });
            }
        }

        function appendWord(el,word){if(isReviewed)return;el.classList.add("used");currentSelection.push({el,val:word});renderSlots();}
        function clearLastWord(){if(isReviewed||!currentSelection.length)return;currentSelection.pop().el.classList.remove("used");renderSlots();}
        document.getElementById("answer-slots").addEventListener("click",clearLastWord);

        function renderSlots(){
            let s=document.getElementById("answer-slots");s.innerHTML="";
            currentSelection.forEach(item=>{let n=document.createElement("span");n.className="word-token bg-white border-2 border-blue-400 text-blue-900 px-4 py-2 rounded-lg font-bold";n.textContent=item.val;s.appendChild(n);});
        }

        function evalChoice(idx,btn){
            if(isReviewed)return;isReviewed=true;
            let q=dataset[currentIdx];
            let list=document.querySelectorAll("#options-box .option-item");
            list.forEach(b=>b.disabled=true);
            let fBox=document.getElementById("feedback-alert"),fTxt=document.getElementById("feedback-txt");
            if(idx===q.correct){totalScore++;btn.classList.add("correct");fTxt.textContent="✅ Chính xác!";fBox.className="feedback-pop p-4 rounded-xl mb-5 bg-green-100 border border-green-500 text-green-900";playAudio('good');}
            else{btn.classList.add("incorrect");list[q.correct].classList.add("correct");fTxt.textContent="❌ Chưa chính xác";fBox.className="feedback-pop p-4 rounded-xl mb-5 bg-red-100 border border-red-500 text-red-900";playAudio('bad');}
            fBox.classList.remove("hidden");document.getElementById("next-btn").classList.remove("hidden");
        }

        function checkUnscramble(){
            if(isReviewed)return;isReviewed=true;
            let q=dataset[currentIdx],ans=currentSelection.map(i=>i.val).join(" ");
            let fBox=document.getElementById("feedback-alert"),fTxt=document.getElementById("feedback-txt");
            document.getElementById("submit-btn").classList.add("hidden");
            if(ans.trim()===q.correctStr.trim()){totalScore++;fTxt.textContent="✅ Chính xác!";fBox.className="feedback-pop p-4 rounded-xl mb-5 bg-green-100 border border-green-500 text-green-900";playAudio('good');}
            else{fTxt.textContent=`❌ Chưa chính xác\n(Đáp án: ${q.correctStr})`;fBox.className="feedback-pop p-4 rounded-xl mb-5 bg-red-100 border border-red-500 text-red-900";playAudio('bad');}
            fBox.classList.remove("hidden");document.getElementById("next-btn").classList.remove("hidden");
        }

        function goNext(){currentIdx++;if(currentIdx<dataset.length)loadQuestion();else showEnd();}

        function showEnd(){
            document.getElementById("quiz-flow").classList.add("hidden");
            document.getElementById("result-flow").classList.remove("hidden");
            document.getElementById("score-lbl").textContent=`${totalScore} / 15`;
            let msg="";
            if(totalScore>=13)msg="Quá tuyệt vời! Chúc mừng em đạt kết quả xuất sắc! 🎉🌟";
            else if(totalScore>=9)msg="Làm tốt lắm! Ôn lại một số câu sai để đạt điểm tối đa nhé! 👍";
            else msg="Em đã rất cố gắng. Hãy xem lại phần giải thích để học kỹ hơn nhé! ❤️";
            document.getElementById("result-text").textContent=msg;
            playAudio('win');
        }

        function resetQuiz(){currentIdx=0;totalScore=0;document.getElementById("quiz-flow").classList.remove("hidden");document.getElementById("result-flow").classList.add("hidden");loadQuestion();}

        window.onload=loadQuestion;
    </script>
