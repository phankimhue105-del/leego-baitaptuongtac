<html lang="vi">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 5 Fun in the Park Quiz</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Fraunces:opsz,wght@9..144,600;9..144,700&amp;display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#17324d;
      --sky:#dff6ff;
      --blue:#58b8e8;
      --blue-deep:#2d8fc0;
      --yellow:#ffd86b;
      --green:#32b67a;
      --red:#ef6b72;
      --paper:#fffefb;
      --muted:#6c8093;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'DM Sans',sans-serif;
      color:var(--ink);
      width:100%;
      min-height:100%;
      overflow-x:hidden;
    }
    .full-height-wrapper{
      min-height:calc(100 * min(var(--vh, 1vh), 1vh));
      display:flex;
      flex-direction:column;
    }
    .header-footer-bar{
      width:100%;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(255,255,255,.65);
      padding:12px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      color:#2d8fc0;
      font-size:13px;
      font-weight:700;
    }
    .footer-bar{
      border-top:1px solid rgba(255,255,255,.65);
      border-bottom:none;
    }
    .page-wrap{
      width:100%;
      flex:1;
      position:relative;
      overflow:hidden;
      padding:28px;
    }
    .page-wrap::before,
    .page-wrap::after{
      content:"";
      position:absolute;
      border-radius:999px;
      pointer-events:none;
      opacity:.42;
      filter:blur(2px);
    }
    .page-wrap::before{
      width:330px;height:330px;background:#fff;top:-120px;left:-80px;
    }
    .page-wrap::after{
      width:260px;height:260px;background:#b9ecff;right:-80px;bottom:-90px;
    }
    .star{
      position:absolute;
      color:#fff;
      opacity:.75;
      font-size:24px;
      animation:twinkle 3.2s ease-in-out infinite;
      pointer-events:none;
    }
    .star:nth-child(1){top:10%;left:8%;animation-delay:.2s}
    .star:nth-child(2){top:19%;right:12%;animation-delay:1.1s}
    .star:nth-child(3){bottom:16%;left:12%;animation-delay:1.8s}
    .star:nth-child(4){bottom:26%;right:8%;animation-delay:.7s}
    @keyframes twinkle{
      0%,100%{transform:scale(1) rotate(0deg);opacity:.4}
      50%{transform:scale(1.22) rotate(12deg);opacity:.9}
    }
    .app-shell{
      position:relative;
      z-index:2;
      width:100%;
      max-width:920px;
      margin:0 auto;
    }
    .hero{
      text-align:center;
      margin-bottom:20px;
      animation:rise .65s ease both;
    }
    .subject-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      box-shadow:0 8px 18px rgba(31,111,148,.12);
      font-size:13px;
      font-weight:700;
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .hero h1{
      margin:12px 0 6px;
      font-family:'Fraunces',serif;
      line-height:1.08;
    }
    .hero p{
      margin:0 auto;
      max-width:560px;
      line-height:1.55;
    }
    .progress-shell{
      background:rgba(255,255,255,.74);
      border:1px solid rgba(255,255,255,.8);
      backdrop-filter:blur(8px);
      border-radius:22px;
      padding:15px 18px;
      margin:0 auto 18px;
      box-shadow:0 10px 30px rgba(41,128,168,.09);
      animation:rise .65s .08s ease both;
    }
    .progress-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:10px;
    }
    .progress-note{
      font-size:13px;
      color:#5f7b90;
      font-weight:700;
    }
    .progress-track{
      width:100%;
      height:11px;
      border-radius:999px;
      background:#e7f4f8;
      overflow:hidden;
      box-shadow:inset 0 1px 3px rgba(0,0,0,.04);
    }
    .progress-fill{
      height:100%;
      width:6.66%;
      border-radius:999px;
      background:linear-gradient(90deg,#55b7e8,#71d5df);
      transition:width .45s ease;
    }
    .quiz-card,.summary-card{
      border-radius:30px;
      padding:28px;
      box-shadow:0 18px 40px rgba(33,104,136,.14);
      border:1px solid rgba(255,255,255,.8);
      animation:rise .65s .14s ease both;
    }
    .question-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }
    .question-badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .question-icon{
      width:42px;height:42px;
      display:grid;place-items:center;
      border-radius:14px;
      background:#fff5d4;
      color:#d39a14;
    }
    .question-text{
      margin:0 0 20px;
      line-height:1.35;
      font-family:'Fraunces',serif;
    }
    .reading-panel{
      display:none;
      margin-bottom:20px;
      padding:18px 20px;
      border-radius:20px;
      border:1px solid #dcecf2;
      background:#f4fbfe;
      box-shadow:0 8px 20px rgba(65,130,157,.08);
    }
    .reading-panel.show{display:block}
    .reading-copy{
      margin:0;
      color:#4f6f85;
      line-height:1.65;
      font-size:15px;
    }
    .question-image-wrap{
      margin:0 0 20px;
      border-radius:22px;
      overflow:hidden;
      background:#eef8fc;
      border:1px solid #d9edf4;
      box-shadow:0 10px 24px rgba(65,130,157,.11);
    }
    .question-image{
      display:none;
      width:100%;
      height:260px;
      object-fit:cover;
    }
    .question-image.show{display:block}
    .options-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .option-btn{
      width:100%;
      border:2px solid #dcecf2;
      border-radius:18px;
      background:#fff;
      color:var(--ink);
      text-align:left;
      padding:16px;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:68px;
      cursor:pointer;
      transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease,background .2s ease;
      font-weight:700;
    }
    .option-btn:hover:not(:disabled){
      transform:translateY(-2px);
      border-color:#8bd4ef;
      box-shadow:0 10px 20px rgba(82,159,194,.12);
    }
    .option-btn:focus-visible,
    .next-btn:focus-visible,
    .restart-btn:focus-visible{
      outline:4px solid rgba(255,216,107,.8);
      outline-offset:3px;
    }
    .option-letter{
      width:34px;height:34px;
      display:grid;place-items:center;
      flex:0 0 34px;
      border-radius:11px;
      background:#edf8fc;
      color:#348eb8;
      font-size:14px;
      font-weight:800;
    }
    .option-btn.correct{
      border-color:#63c99d;
      background:#f0fff7;
      box-shadow:0 8px 18px rgba(50,182,122,.14);
    }
    .option-btn.correct .option-letter{background:#dff8eb;color:#1e8e5e}
    .option-btn.wrong{
      border-color:#f2a1a6;
      background:#fff5f5;
      box-shadow:0 8px 18px rgba(239,107,114,.12);
    }
    .option-btn.wrong .option-letter{background:#ffe3e5;color:#d5535c}
    .option-btn:disabled{cursor:default}
    .feedback{
      margin-top:18px;
      border-radius:20px;
      padding:16px;
      display:none;
      align-items:flex-start;
      gap:12px;
      border:1px solid #e4eef2;
    }
    .feedback.show{display:flex}
    .feedback-badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .feedback-badge.good{background:#dcf7e9;color:#1e8a5c}
    .feedback-badge.bad{background:#ffe4e6;color:#cf4e57}
    .feedback-copy{
      font-size:14px;
      line-height:1.55;
      margin-top:1px;
    }
    .actions{
      margin-top:20px;
      display:flex;
      justify-content:flex-end;
    }
    .next-btn,.restart-btn{
      border:none;
      border-radius:16px;
      padding:14px 18px;
      display:none;
      align-items:center;
      gap:8px;
      cursor:pointer;
      font-weight:800;
      box-shadow:0 10px 20px rgba(45,143,192,.2);
      transition:transform .2s ease,box-shadow .2s ease;
    }
    .next-btn.show{display:inline-flex}
    .next-btn:hover,.restart-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 24px rgba(45,143,192,.24);
    }
    .summary-card{
      display:none;
      text-align:center;
      padding:40px 30px;
    }
    .summary-card.show{display:block}
    .summary-emoji{
      width:78px;height:78px;
      border-radius:24px;
      margin:0 auto 14px;
      display:grid;place-items:center;
      background:#fff3c7;
      color:#c89210;
    }
    .summary-kicker{
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:12px;
      font-weight:800;
      margin-bottom:8px;
    }
    .score{
      font-family:'Fraunces',serif;
      margin:0 0 8px;
      line-height:1.1;
      font-size:2.3rem;
    }
    .summary-message{
      max-width:440px;
      margin:0 auto 24px;
      line-height:1.55;
    }
    .restart-btn{
      display:inline-flex;
      margin:auto;
    }
    @keyframes rise{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
    @media (max-width:700px){
      .page-wrap{padding:18px}
      .quiz-card,.summary-card{padding:22px;border-radius:24px}
      .options-grid{grid-template-columns:1fr}
      .hero h1{font-size:2.1rem}
      .feedback{flex-direction:column}
      .actions{justify-content:stretch}
      .next-btn{justify-content:center;width:100%}
      .question-image{height:220px}
      .header-footer-bar{padding:10px 16px;font-size:12px}
    }
    @media (max-width:520px){
      .header-footer-bar{
        align-items:flex-start;
        flex-direction:column;
        gap:4px;
      }
    }
  </style>

      { section:"Ngữ pháp", question:"Which one is harder, the marble ______ the ball? - The marble is harder.", options:["than","or","and","but"], answer:1, explanation:"Khi đưa ra 2 lựa chọn để so sánh (hòn bi hay quả bóng), chúng ta dùng từ 'or' (hoặc)." },
      { section:"Ngữ pháp", question:"Her hat is prettier ______ his hat.", options:["than","or","then","that"], answer:0, explanation:"Cấu trúc so sánh hơn bắt buộc phải có từ 'than' (hơn) đứng sau tính từ so sánh." },
      { section:"Ngữ pháp", question:"The box is light, but the backpack is ______.", options:["hard","light","lighter","soft"], answer:2, explanation:"Vế trước dùng từ 'but' chỉ sự đối lập, chiếc hộp nhẹ còn chiếc ba lô thì nhẹ hơn ('lighter') hoặc nặng hơn, dựa vào ngữ cảnh phù hợp ở đây chọn 'lighter'." },

      { section:"Đọc hiểu", question:"Choose the best word for blank (10).", options:["tall","short","weak","thin"], answer:0, explanation:"Người đàn ông khỏe mạnh ('strong') và có thể nhấc vật nặng thì thường 'tall' (cao lớn).", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (11).", options:["hard","soft","heavy","thick"], answer:1, explanation:"Quả bóng nảy và êm thì có đặc tính là 'soft' (mềm).", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (12).", options:["soft","clean","hard","pretty"], answer:2, explanation:"'The rock is hard' nghĩa là hòn đá thì cứng.", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (13).", options:["dirty","clean","ugly","thin"], answer:1, explanation:"Từ 'but' thể hiện sự trái ngược: giày của tôi bẩn ('dirty') thì giày của mẹ sạch sẽ ('clean').", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (14).", options:["pretty","ugly","dirty","hard"], answer:0, explanation:"Chúng tôi yêu công viên vì công viên rất 'pretty' (đẹp/đáng yêu).", reading:true }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const progressLabel = document.getElementById('progressLabel');
    const progressFill = document.getElementById('progressFill');
    const questionLabel = document.getElementById('questionLabel');
    const questionText = document.getElementById('questionText');
    const optionButtons = [0,1,2,3].map(i => document.getElementById('option' + i));
    const feedback = document.getElementById('feedback');
    const feedbackBadge = document.getElementById('feedbackBadge');
    const feedbackText = document.getElementById('feedbackText');
    const nextButton = document.getElementById('nextButton');
    const quizCard = document.getElementById('quizCard');
    const summaryCard = document.getElementById('summaryCard');
    const scoreText = document.getElementById('scoreText');
    const summaryMessage = document.getElementById('summaryMessage');
    const restartButton = document.getElementById('restartButton');
    const imageWrap = document.getElementById('imageWrap');
    const questionImages = Array.from(document.querySelectorAll('.question-image'));
    const readingPanel = document.getElementById('readingPanel');

    function speakWord(word){
      if(!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = 'en-US';
      utterance.rate = 0.82;
      utterance.pitch = 1.05;
      window.speechSynthesis.speak(utterance);
    }

    function playFeedbackTone(type){
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if(!AudioContext) return;
      const ctx = new AudioContext();
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.05);
      gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 2);

      if(type === 'success'){
        const notes = [
          {f:523.25,t:0,d:.22},
          {f:659.25,t:.28,d:.22},
          {f:783.99,t:.56,d:.28},
          {f:1046.5,t:.9,d:.45},
          {f:783.99,t:1.45,d:.25},
          {f:1046.5,t:1.72,d:.25}
        ];
        notes.forEach(n=>{
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(n.f, ctx.currentTime+n.t);
          osc.connect(gain);
          osc.start(ctx.currentTime+n.t);
          osc.stop(ctx.currentTime+n.t+n.d);
        });
      }else{
        const notes = [
          {f:246.94,t:0,d:.3},
          {f:220,t:.4,d:.35},
          {f:196,t:.9,d:.4},
          {f:174.61,t:1.45,d:.45}
        ];
        notes.forEach(n=>{
          const osc = ctx.createOscillator();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(n.f, ctx.currentTime+n.t);
          osc.connect(gain);
          osc.start(ctx.currentTime+n.t);
          osc.stop(ctx.currentTime+n.t+n.d);
        });
      }
      setTimeout(()=>ctx.close(),2100);
    }

    function playFinalCelebration(){
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if(!AudioContext) return;
      const ctx = new AudioContext();
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.08);
      gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 3);

      const notes = [
        {f:523.25,t:0,d:.18},{f:659.25,t:.2,d:.18},{f:783.99,t:.4,d:.2},
        {f:1046.5,t:.68,d:.35},{f:880,t:1.1,d:.18},{f:1046.5,t:1.32,d:.2},
        {f:1174.66,t:1.58,d:.25},{f:1318.51,t:1.92,d:.55},
        {f:1046.5,t:2.5,d:.35}
      ];
      notes.forEach(n=>{
        const osc = ctx.createOscillator();
        osc.type='sine';
        osc.frequency.setValueAtTime(n.f, ctx.currentTime+n.t);
        osc.connect(gain);
        osc.start(ctx.currentTime+n.t);
        osc.stop(ctx.currentTime+n.t+n.d);
      });
      setTimeout(()=>ctx.close(),3100);
    }

    function renderQuestion(){
      answered = false;
      const q = questions[current];

      progressLabel.textContent = `Câu hỏi ${current + 1} trên ${questions.length}`;
      questionLabel.textContent = `${q.section} • Câu ${current + 1}`;
      questionText.textContent = q.question;
      progressFill.style.width = `${((current + 1) / questions.length) * 100}%`;

      optionButtons.forEach((btn, i) => {
        btn.disabled = false;
        btn.classList.remove('correct','wrong');
        btn.querySelector('.option-copy').textContent = q.options[i];
      });

      questionImages.forEach(img => img.classList.remove('show'));
      if(typeof q.imageIndex === 'number'){
        imageWrap.style.display = 'block';
        questionImages[q.imageIndex].classList.add('show');
      }else{
        imageWrap.style.display = 'none';
      }

      readingPanel.classList.toggle('show', !!q.reading);

      feedback.classList.remove('show');
      feedbackBadge.className = 'feedback-badge';
      feedbackBadge.textContent = '';
      feedbackText.textContent = '';
      nextButton.classList.remove('show');
    }

    function handleAnswer(index){
      if(answered) return;
      answered = true;

      const q = questions[current];
      const isCorrect = index === q.answer;

      if(q.speak){
        speakWord(q.options[index]);
      }

      if(isCorrect) score++;

      optionButtons.forEach((btn, i) => {
        btn.disabled = true;
        if(i === q.answer) btn.classList.add('correct');
        if(i === index && i !== q.answer) btn.classList.add('wrong');
      });

      feedback.classList.add('show');
      feedbackBadge.classList.add(isCorrect ? 'good' : 'bad');
      feedbackBadge.innerHTML = isCorrect
        ? '<i data-lucide="check-circle-2" style="width:15px;height:15px;"></i> Chính xác'
        : '<i data-lucide="x-circle" style="width:15px;height:15px;"></i> Chưa chính xác';
      feedbackText.textContent = `${isCorrect ? 'Chính xác! ' : 'Chưa chính xác! '}${q.explanation}`;
      nextButton.classList.add('show');

      playFeedbackTone(isCorrect ? 'success' : 'error');
      lucide.createIcons();
    }

    function showSummary(){
      quizCard.style.display = 'none';
      document.querySelector('.progress-shell').style.display = 'none';
      summaryCard.classList.add('show');
      scoreText.textContent = `Kết quả tổng hợp của bạn: ${score}/${questions.length} câu đúng!`;
      summaryMessage.textContent = score >= 12 ? 'Xuất sắc quá!' : 'Cố gắng luyện tập thêm nhé!';
      playFinalCelebration();
    }

    function nextQuestion(){
      current++;
      if(current >= questions.length){
        showSummary();
      }else{
        renderQuestion();
      }
    }

    function restartQuiz(){
      current = 0;
      score = 0;
      quizCard.style.display = 'block';
      document.querySelector('.progress-shell').style.display = 'block';
      summaryCard.classList.remove('show');
      renderQuestion();
    }

    optionButtons.forEach((btn, i) => btn.addEventListener('click', () => handleAnswer(i)));
    nextButton.addEventListener('click', nextQuestion);
    restartButton.addEventListener('click', restartQuiz);

    renderQuestion();
    lucide.createIcons();
  </script>
