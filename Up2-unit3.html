  <style>
body{font-family:'DM Sans',sans-serif;margin:0;padding:0}
.screen{display:none;padding:70px 16px 60px;min-height:calc(100*min(var(--vh,1vh),1vh));box-sizing:border-box}
.screen.active{display:block}
.hdr,.ftr{position:fixed;left:0;right:0;z-index:100;background:#ff6b35;color:#fff;font-size:12px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.hdr{top:0}.ftr{bottom:0}
.prog-bar{height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;background:linear-gradient(90deg,#4ecdc4,#44bd32);transition:width .3s}
.word-btn{display:inline-block;padding:10px 18px;margin:5px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;border:2px solid #6c5ce7;background:#dfe6e9;color:#2d3436;transition:all .2s}
.word-btn.selected{background:#6c5ce7;color:#fff}
.word-btn:active{transform:scale(.95)}
.answer-bar{min-height:56px;border:3px dashed #6c5ce7;border-radius:12px;padding:8px;margin-bottom:12px;display:flex;flex-wrap:wrap;align-items:center}
.opt-btn{display:block;width:100%;text-align:left;padding:14px 18px;margin:6px 0;border-radius:12px;font-size:1.1rem;font-weight:600;border:2px solid #b2bec3;background:#fff;cursor:pointer;transition:all .2s}
.opt-btn:hover{border-color:#6c5ce7;background:#f8f9ff}
.opt-btn.correct{background:#00b894;color:#fff;border-color:#00b894}
.opt-btn.wrong{background:#d63031;color:#fff;border-color:#d63031}
.feedback-box{padding:16px;border-radius:12px;margin-top:12px;font-weight:600}
.feedback-box.correct{background:#d4edda;color:#155724;border:2px solid #00b894}
.feedback-box.wrong{background:#f8d7da;color:#721c24;border:2px solid #d63031}
.btn-primary{background:#6c5ce7;color:#fff;border:none;padding:14px 28px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary:active{transform:scale(.95)}
svg.q-img{max-width:180px;height:auto;margin:0 auto;display:block}
.review-table{width:100%;border-collapse:collapse;font-size:.85rem}
.review-table th,.review-table td{border:1px solid #ddd;padding:8px;text-align:center}
.review-table th{background:#6c5ce7;color:#fff}
</style>

   <span>Trung tâm Anh ngữ LeeGo - Hotline: 0988.526.585</span> <span>Up 2 - Unit 3</span>

   <div class="max-w-md mx-auto text-center pt-8">

    <h1 class="text-3xl font-black text-purple-700 my-6" data-template-id="cover-title">UNIT 3: THINGS TO EAT</h1>
    <div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
     <label class="block text-left font-bold mb-2" data-template-id="pw-label">Password:</label> <input id="pw-input" type="password" class="w-full border-2 border-purple-300 rounded-xl p-3 text-lg mb-3" placeholder="Nhập mật khẩu...">
     <div id="pw-msg" class="text-sm mb-3"></div><button id="unlock-btn" class="btn-primary w-full mb-3" onclick="checkPassword()">🔓 UNLOCK QUIZ</button> <button id="start-btn" class="btn-primary w-full bg-green-500" disabled onclick="startQuiz()">▶️ START QUIZ</button>

   <div class="max-w-lg mx-auto text-center">
    <h2 class="text-2xl font-black text-purple-700 my-4" data-template-id="result-title">🎉 HOÀN THÀNH BÀI LUYỆN TẬP 🎉</h2>

   </div>

  <script>
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
async function unlockAudio(){if(audioCtx.state==='suspended')await audioCtx.resume()}
document.addEventListener('touchstart',unlockAudio,{once:true});
document.addEventListener('click',unlockAudio,{once:true});

function playTone(freq,dur,type='sine'){
const o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type=type;o.frequency.value=freq;g.gain.value=.3;
o.connect(g);g.connect(audioCtx.destination);
o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
o.stop(audioCtx.currentTime+dur);
}
async function playCorrect(){await unlockAudio();playTone(523,.15);setTimeout(()=>playTone(659,.15),150);setTimeout(()=>playTone(784,.4),300)}
async function playWrong(){await unlockAudio();playTone(200,.3,'sawtooth');setTimeout(()=>playTone(150,.4,'sawtooth'),300)}
async function playCelebration(){await unlockAudio();[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.3),i*200));setTimeout(()=>playTone(1047,.8),800)}

function checkPassword(){
unlockAudio();
const v=document.getElementById('pw-input').value;
const msg=document.getElementById('pw-msg');
if(v==='1205'){msg.innerHTML='<span class="text-green-600 font-bold">✅ Access granted</span>';document.getElementById('start-btn').disabled=false}
else{msg.innerHTML='<span class="text-red-600 font-bold">❌ Incorrect password. Please try again.</span>'}
}

const questions=[
{type:'mc',img:'egg',q:'What is this?',opts:['apple','milk','egg','cheese'],correct:2,exp:'"Egg" nghĩa là quả trứng.'},
{type:'mc',img:'apple',q:'What is this?',opts:['peach','apple','banana','orange'],correct:1,exp:'"Apple" nghĩa là quả táo.'},
{type:'mc',img:'milk',q:'What is this?',opts:['yogurt','butter','juice','milk'],correct:3,exp:'"Milk" nghĩa là sữa.'},
{type:'build',words:['want','I','soup'],punct:'.',correct:'I want soup.',exp:'"I want soup." nghĩa là "Tôi muốn ăn súp."'},
{type:'build',words:['want','doesn\'t','He','salad'],punct:'.',correct:'He doesn\'t want salad.',exp:'"He doesn\'t want salad." nghĩa là "Cậu ấy không muốn ăn salad."'},
{type:'build',words:['have','Do','apples','you'],punct:'?',correct:'Do you have apples?',exp:'"Do you have apples?" nghĩa là "Bạn có táo không?"'},
{type:'build',words:['has','She','a','banana'],punct:'.',correct:'She has a banana.',exp:'"She has a banana." nghĩa là "Cô ấy có một quả chuối."'},
{type:'build',words:['Does','have','he','oranges'],punct:'?',correct:'Does he have oranges?',exp:'"Does he have oranges?" nghĩa là "Cậu ấy có cam không?"'},
{type:'mc',q:'I ______ apples.',opts:['has','have','having','had'],correct:1,exp:'Chủ ngữ "I" đi với "have".'},
{type:'mc',q:'She ______ an apple.',opts:['have','having','has','had'],correct:2,exp:'Chủ ngữ "She" đi với "has".'},
{type:'mc',q:'Do you want an apple?\nYes, I ______.',opts:['do','does','am','is'],correct:0,exp:'Câu trả lời ngắn với "Do" là "Yes, I do."'},
{type:'mc',q:'Does he have apples?\nNo, he ______.',opts:["don't","doesn't","isn't","aren't"],correct:1,exp:'Lưu ý câu hỏi dùng "Does". Vì vậy câu trả lời ngắn là "No, he doesn\'t."'}
];

const svgs={
egg:`<svg class="q-img" viewBox="0 0 100 130"><ellipse cx="50" cy="72" rx="35" ry="50" fill="#FFF8DC" stroke="#DAA520" stroke-width="2"/><ellipse cx="50" cy="72" rx="30" ry="45" fill="#FFFACD"/><ellipse cx="40" cy="60" rx="6" ry="10" fill="#fff" opacity=".5"/></svg>`,
apple:`<svg class="q-img" viewBox="0 0 100 120"><path d="M50 25c-20-10-45 10-40 40 5 35 25 45 40 50 15-5 35-15 40-50 5-30-20-50-40-40z" fill="#e74c3c"/><path d="M50 25c-5-15 0-25 5-25s5 10 0 25" fill="#27ae60"/><ellipse cx="38" cy="55" rx="8" ry="12" fill="#fff" opacity=".25"/></svg>`,
milk:`<svg class="q-img" viewBox="0 0 100 140"><defs><linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" /><stop offset="50%" style="stop-color:#fff;stop-opacity:0.8" /><stop offset="100%" style="stop-color:#d0e8f2;stop-opacity:1" /></linearGradient></defs><path d="M 30 35 L 25 115 Q 25 125 35 125 L 65 125 Q 75 125 75 115 L 70 35 Z" fill="url(#glassGrad)" stroke="#a0c4d4" stroke-width="1.5"/><rect x="28" y="60" width="44" height="62" fill="#f5f9e8" stroke="none" opacity="0.9"/><ellipse cx="50" cy="60" rx="23" ry="4" fill="#e8f0dc" opacity="0.7"/><ellipse cx="50" cy="35" rx="22" ry="5" fill="none" stroke="#b0d0e0" stroke-width="1.5"/><circle cx="42" cy="50" r="3" fill="#fff" opacity="0.4"/><circle cx="65" cy="75" r="2.5" fill="#fff" opacity="0.3"/></svg>`
};

let current=0,score=0,answers=[],buildSelected=[];

function startQuiz(){unlockAudio();showScreen('quiz');renderQ()}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function renderQ(){
const q=questions[current];
document.getElementById('prog-fill').style.width=((current)/12*100)+'%';
document.getElementById('q-counter').textContent=`Câu ${current+1}/12`;
document.getElementById('feedback').className='hidden';
document.getElementById('next-btn').classList.add('hidden');
const c=document.getElementById('q-content');
if(q.type==='mc'){
let html='';
if(q.img)html+=svgs[q.img];
html+=`<p class="text-xl font-bold text-center my-4" style="white-space:pre-line">${q.q}</p><div id="opts">`;
q.opts.forEach((o,i)=>html+=`<button class="opt-btn" onclick="checkMC(${i})">${String.fromCharCode(65+i)}. ${o}</button>`);
html+='</div>';c.innerHTML=html;
}else{
buildSelected=[];
let shuffled=[...q.words].sort(()=>Math.random()-.5);
let html=`<p class="text-xl font-bold text-center my-4">Reorder the words.</p>`;
html+=`<div class="answer-bar" id="ans-bar"></div>`;
html+=`<div class="text-right text-2xl font-bold text-purple-600 mb-2">${q.punct}</div>`;
html+=`<div id="word-bank">`;
shuffled.forEach((w,i)=>html+=`<span class="word-btn" data-idx="${i}" data-word="${w}" onclick="toggleWord(this)">${w}</span>`);
html+=`</div><button class="btn-primary w-full mt-4" id="check-build-btn" onclick="checkBuild()">Kiểm tra</button>`;
c.innerHTML=html;
}
}

function toggleWord(el){
const bar=document.getElementById('ans-bar');
if(el.classList.contains('selected')){el.classList.remove('selected');bar.querySelector(`[data-ref="${el.dataset.idx}"]`)?.remove()}
else{el.classList.add('selected');const s=document.createElement('span');s.className='word-btn selected';s.dataset.ref=el.dataset.idx;s.textContent=el.dataset.word;s.onclick=()=>{el.classList.remove('selected');s.remove()};bar.appendChild(s)}
}

function checkBuild(){
const q=questions[current];
const bar=document.getElementById('ans-bar');
const words=[...bar.children].map(c=>c.textContent).join(' ')+q.punct;
const isCorrect=words===q.correct;
answers.push({q:q.correct,a:words,ok:isCorrect});
if(isCorrect){score++;playCorrect()}else playWrong();
showFeedback(isCorrect,q.exp);
document.getElementById('check-build-btn').classList.add('hidden');
document.querySelectorAll('.word-btn').forEach(b=>b.style.pointerEvents='none');
}

function checkMC(i){
const q=questions[current];
const isCorrect=i===q.correct;
answers.push({q:q.opts[q.correct],a:q.opts[i],ok:isCorrect});
if(isCorrect){score++;playCorrect()}else playWrong();
document.querySelectorAll('.opt-btn').forEach((b,idx)=>{b.disabled=true;if(idx===q.correct)b.classList.add('correct');else if(idx===i&&!isCorrect)b.classList.add('wrong')});
showFeedback(isCorrect,q.exp);
}

function showFeedback(ok,exp){
const f=document.getElementById('feedback');
f.className=ok?'feedback-box correct':'feedback-box wrong';
f.innerHTML=(ok?'✅ Chính xác':'❌ Chưa chính xác')+'<br><small>'+exp+'</small>';
document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion(){
current++;
if(current>=12)showResult();
else renderQ();
}

function showResult(){
showScreen('result');
document.getElementById('prog-fill').style.width='100%';
playCelebration();
const pct=Math.round(score/12*100);
let msg='💪 Hãy luyện tập lại!';
if(score===12)msg='🌟 Xuất sắc!';else if(score>=10)msg='🎉 Rất tốt!';else if(score>=8)msg='👍 Tốt!';else if(score>=6)msg='🙂 Cố gắng thêm nhé!';
let html=`<p class="text-4xl font-black my-4">${score}/12</p><p class="text-xl">${pct}%</p><p class="text-2xl my-2">${msg}</p>`;
html+=`<table class="review-table my-4"><tr><th>#</th><th>Đáp án bạn chọn</th><th>Đáp án đúng</th><th>KQ</th></tr>`;
answers.forEach((a,i)=>html+=`<tr><td>${i+1}</td><td>${a.a}</td><td>${a.q}</td><td>${a.ok?'✅':'❌'}</td></tr>`);
html+=`</table><button class="btn-primary mr-2" onclick="resetQuiz()">🔄 Làm lại</button><button class="btn-primary bg-green-500" onclick="showScreen('cover')">🏠 Về trang chủ</button>`;
document.getElementById('result-content').innerHTML=html;
}

function resetQuiz(){current=0;score=0;answers=[];showScreen('quiz');renderQ()}
</script>
