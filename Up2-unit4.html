  <style>
:root{--primary:#FF6B35;--secondary:#004E89;--success:#2ECC71;--error:#E74C3C;--bg:#FFF8F0;--card:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:calc(100*min(var(--vh,1vh),1vh));}
.hf-bar{position:fixed;left:0;right:0;background:var(--secondary);color:#fff;font-size:0.75rem;padding:6px 12px;display:flex;justify-content:space-between;z-index:100;}
.hf-top{top:0;}
.hf-bot{bottom:0;}
.main-area{padding:56px 12px;max-width:600px;margin:0 auto;}
.screen{display:none;}
.screen.active{display:block;}
.btn{padding:14px 28px;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-success{background:var(--success);color:#fff;}
.btn-secondary{background:var(--secondary);color:#fff;}
.opt-btn{display:block;width:100%;text-align:left;padding:14px 18px;margin:8px 0;border:3px solid #ddd;border-radius:12px;font-size:1.1rem;background:#fff;cursor:pointer;transition:all .15s;}
.opt-btn:hover{border-color:var(--primary);}
.opt-btn.correct{border-color:var(--success);background:#d4edda;}
.opt-btn.wrong{border-color:var(--error);background:#f8d7da;}
.feedback{padding:14px;border-radius:10px;margin:12px 0;font-size:1rem;}
.feedback.ok{background:#d4edda;color:#155724;}
.feedback.no{background:#f8d7da;color:#721c24;}
.progress-wrap{height:10px;background:#ddd;border-radius:5px;margin:12px 0;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#f7b731);transition:width .3s;}
.answer-bar{min-height:50px;border:3px dashed #bbb;border-radius:10px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.word-btn{padding:10px 16px;border-radius:8px;border:2px solid var(--secondary);background:#e8f4fd;font-size:1rem;font-weight:600;cursor:pointer;}
.word-btn.used{opacity:.3;pointer-events:none;}
.word-btn.in-bar{background:var(--secondary);color:#fff;border-color:var(--secondary);}
table{width:100%;border-collapse:collapse;font-size:.85rem;margin:12px 0;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:var(--secondary);color:#fff;}
svg.illust{max-width:160px;margin:0 auto 12px;display:block;}
</style>

   <span data-template-id="header-left" class="canva-text">Trung tâm Anh ngữ LeeGo - Hotline: 0988.526.585</span><span data-template-id="header-right" class="canva-text">Up 3 - Unit 4</span>
  </div>

   <span data-template-id="footer-left" class="canva-text">Trung tâm Anh ngữ LeeGo - Hotline: 0988.526.585</span><span data-template-id="footer-right" class="canva-text">Up 3 - Unit 4</span>
  </div>
  <div class="main-area"><!-- COVER -->
   <div id="cover" class="screen active" style="text-align:center;padding-top:30px;">
    <h1 data-template-id="cover-title" class="canva-text" style="font-size:1.8rem;font-weight:800;color:var(--secondary);margin-bottom:20px;"></h1>
    <div style="margin:20px auto;max-width:320px;text-align:left;"><label style="font-weight:600;">Password:</label> <input id="pw-input" type="password" style="width:100%;padding:12px;border:2px solid #ccc;border-radius:8px;font-size:1rem;margin:8px 0;">
     <p id="pw-msg" style="min-height:24px;font-size:.9rem;"></p><button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="checkPw()">UNLOCK QUIZ</button> <button id="start-btn" class="btn btn-success" style="width:100%;" disabled onclick="startQuiz()">START QUIZ</button>
    </div>
   </div><!-- QUIZ -->
   <div id="quiz" class="screen">
    <div class="progress-wrap">
     <div id="prog-fill" class="progress-fill" style="width:0%"></div>
    </div>
    <p id="prog-text" style="font-size:.8rem;text-align:right;color:#666;"></p>
    <div id="q-area"></div>
   </div><!-- RESULT -->
   <div id="result" class="screen" style="text-align:center;padding-top:20px;">
    <h2 id="res-title" style="font-size:1.6rem;font-weight:800;color:var(--primary);">🎉 HOÀN THÀNH BÀI LUYỆN TẬP 🎉</h2>
    <p id="res-score" style="font-size:1.3rem;font-weight:700;margin:12px 0;"></p>
    <p id="res-msg" style="font-size:1.2rem;margin-bottom:16px;"></p>
    <div id="res-table"></div><button class="btn btn-primary" style="margin:8px;" onclick="resetQuiz()">🔄 Làm lại</button> <button class="btn btn-secondary" style="margin:8px;" onclick="goHome()">🏠 Về trang chủ</button>
   </div>

  <script>
// Audio via Web Audio API
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(freq,dur,type='sine'){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=0.3;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur);}
function playCorrect(){playTone(523,.15);setTimeout(()=>playTone(659,.15),150);setTimeout(()=>playTone(784,.3),300);}
function playWrong(){playTone(200,.2,'square');setTimeout(()=>playTone(150,.3,'square'),200);}
function playCelebration(){playTone(523,.15);setTimeout(()=>playTone(659,.15),200);setTimeout(()=>playTone(784,.15),400);setTimeout(()=>playTone(1047,.5),600);}

// Password
function checkPw(){
const v=document.getElementById('pw-input').value;
const msg=document.getElementById('pw-msg');
if(v==='leego125'){msg.innerHTML='<span style="color:green">✅ Access granted</span>';document.getElementById('start-btn').disabled=false;}
else{msg.innerHTML='<span style="color:red">❌ Incorrect password. Please try again.</span>';}
}

// Questions data
const questions=[
// Section 1: Vocab
{type:'mc',svg:'tshirt',q:'What is this?',opts:['hat','T-shirt','shorts','sweater'],ans:1,exp:'"T-shirt" nghĩa là áo phông.'},
{type:'mc',svg:'hat',q:'What is this?',opts:['shorts','coat','hat','socks'],ans:2,exp:'"Hat" nghĩa là chiếc mũ.'},
{type:'mc',svg:'shorts',q:'What are these?',opts:['shorts','shoes','boots','pants'],ans:0,exp:'"Shorts" nghĩa là quần đùi.'},
// Section 2: Click-to-Build
{type:'build',words:['wearing','He','is','a','hat'],punct:'.',correct:'He is wearing a hat.',exp:'"He is wearing a hat." nghĩa là "Cậu ấy đang đội mũ."'},
{type:'build',words:['I','am','wearing','a','T-shirt'],punct:'.',correct:'I am wearing a T-shirt.',exp:'"I am wearing a T-shirt." nghĩa là "Tôi đang mặc áo phông."'},
{type:'build',words:['What','are','you','wearing'],punct:'?',correct:'What are you wearing?',exp:'"What are you wearing?" nghĩa là "Bạn đang mặc gì?"'},
{type:'build',words:['We','are','wearing','green','shorts'],punct:'.',correct:'We are wearing green shorts.',exp:'Chúng tôi đang mặc quần đùi màu xanh lá.'},
{type:'build',words:['Is','she','wearing','a','hat'],punct:'?',correct:'Is she wearing a hat?',exp:'Đây là câu hỏi Yes/No với động từ to be.'},
// Section 3: Grammar MC
{type:'mc',svg:null,q:'I ______ wearing a T-shirt.',opts:['is','am','are','be'],ans:1,exp:'Chủ ngữ "I" đi với "am".'},
{type:'mc',svg:null,q:'He ______ wearing a hat.',opts:['am','are','is','be'],ans:2,exp:'"He" đi với "is".'},
{type:'mc',svg:null,q:'______ she wearing a coat?',opts:['Am','Are','Is','Be'],ans:2,exp:'Câu hỏi với chủ ngữ "she" dùng "Is".'},
{type:'mc',svg:null,q:'We are wearing green ______.',opts:['hat','coat','shorts','sweater'],ans:2,exp:'"Shorts" phù hợp với nghĩa của câu.'},
];

const svgs={
tshirt:'<svg class="illust" viewBox="0 0 100 100"><path d="M30 20 L20 30 L10 25 L15 40 L25 38 L25 85 L75 85 L75 38 L85 40 L90 25 L80 30 L70 20 Z" fill="#FF6B35" stroke="#333" stroke-width="2"/><path d="M40 20 Q50 30 60 20" fill="none" stroke="#333" stroke-width="2"/></svg>',
hat:'<svg class="illust" viewBox="0 0 100 100"><ellipse cx="50" cy="75" rx="40" ry="10" fill="#E74C3C" stroke="#333" stroke-width="2"/><path d="M25 75 Q25 35 50 30 Q75 35 75 75" fill="#E74C3C" stroke="#333" stroke-width="2"/><rect x="20" y="70" width="60" height="10" rx="3" fill="#C0392B" stroke="#333" stroke-width="2"/></svg>',
shorts:'<svg class="illust" viewBox="0 0 100 100"><path d="M25 30 L75 30 L75 45 L65 80 L52 80 L50 50 L48 80 L35 80 L25 45 Z" fill="#3498DB" stroke="#333" stroke-width="2"/><line x1="50" y1="45" x2="50" y2="30" stroke="#333" stroke-width="1.5"/></svg>'
};

let current=0,score=0,answers=[];

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function startQuiz(){initAudio();current=0;score=0;answers=[];show('quiz');renderQ();}

function updateProg(){const p=Math.round((current/questions.length)*100);document.getElementById('prog-fill').style.width=p+'%';document.getElementById('prog-text').textContent=`${current}/${questions.length}`;}

function renderQ(){
updateProg();
const area=document.getElementById('q-area');
const q=questions[current];
let html=`<h3 style="font-size:1rem;color:#666;margin-bottom:4px;">Câu ${current+1}/${questions.length}</h3>`;
if(q.type==='mc'){
if(q.svg&&svgs[q.svg])html+=svgs[q.svg];
html+=`<p style="font-size:1.2rem;font-weight:700;margin:12px 0;">${q.q}</p>`;
q.opts.forEach((o,i)=>{html+=`<button class="opt-btn" onclick="checkMC(${i},this)">${String.fromCharCode(65+i)}. ${o}</button>`;});
}else{
html+=`<p style="font-size:1.1rem;font-weight:700;margin:12px 0;">Sắp xếp thành câu hoàn chỉnh:</p>`;
html+=`<div class="answer-bar" id="ans-bar"></div>`;
html+=`<div class="word-bank" id="word-bank"></div>`;
html+=`<button class="btn btn-primary" style="margin-top:14px;width:100%;" id="check-build-btn" onclick="checkBuild()">Kiểm tra</button>`;
}
html+=`<div id="fb-area"></div>`;
area.innerHTML=html;
if(q.type==='build')initBuild(q);
}

let buildOrder=[];
function initBuild(q){
const bank=document.getElementById('word-bank');
const shuffled=[...q.words].sort(()=>Math.random()-.5);
buildOrder=[];
shuffled.forEach((w,i)=>{
const b=document.createElement('button');b.className='word-btn';b.textContent=w;b.dataset.idx=i;b.dataset.word=w;
b.onclick=function(){toggleWord(this);};
bank.appendChild(b);
});
}
function toggleWord(btn){
const bar=document.getElementById('ans-bar');
if(btn.classList.contains('in-bar')){
btn.classList.remove('in-bar','used');
btn.style.order='';
document.getElementById('word-bank').appendChild(btn);
rebuildBar();
}else{
btn.classList.add('in-bar');
bar.appendChild(btn);
}
}
function rebuildBar(){/* words already moved */}

function checkBuild(){
const bar=document.getElementById('ans-bar');
const words=[...bar.children].map(b=>b.dataset.word);
const q=questions[current];
if(words.length<q.words.length){alert('Hãy chọn tất cả các từ!');return;}
const attempt=words.join(' ')+q.punct;
const isCorrect=attempt===q.correct;
if(isCorrect)score++;
answers.push({q:`Câu ${current+1}`,student:attempt,correct:q.correct,ok:isCorrect});
showFeedback(isCorrect,q.exp);
}

function checkMC(idx,btn){
const q=questions[current];
const btns=document.querySelectorAll('.opt-btn');
btns.forEach(b=>b.onclick=null);
const isCorrect=idx===q.ans;
if(isCorrect){btn.classList.add('correct');score++;}
else{btn.classList.add('wrong');btns[q.ans].classList.add('correct');}
answers.push({q:`Câu ${current+1}`,student:q.opts[idx],correct:q.opts[q.ans],ok:isCorrect});
showFeedback(isCorrect,q.exp);
}

function showFeedback(ok,exp){
if(ok)playCorrect();else playWrong();
const fb=document.getElementById('fb-area');
fb.innerHTML=`<div class="feedback ${ok?'ok':'no'}">${ok?'✅ Chính xác':'❌ Chưa chính xác'}<br><small>${exp}</small></div><button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="nextQ()">Tiếp tục</button>`;
}

function nextQ(){current++;if(current>=questions.length)showResult();else renderQ();}

function showResult(){
current=questions.length;updateProg();
show('result');
playCelebration();
const pct=Math.round(score/questions.length*100);
document.getElementById('res-score').textContent=`${score}/${questions.length} (${pct}%)`;
let msg='';
if(score===12)msg='🌟 Xuất sắc!';
else if(score>=10)msg='🎉 Rất tốt!';
else if(score>=8)msg='👍 Tốt!';
else if(score>=6)msg='🙂 Cố gắng thêm nhé!';
else msg='💪 Hãy luyện tập lại!';
document.getElementById('res-msg').textContent=msg;
let t='<table><tr><th>Câu</th><th>Trả lời</th><th>Đáp án</th><th>KQ</th></tr>';
answers.forEach(a=>{t+=`<tr><td>${a.q}</td><td>${a.student}</td><td>${a.correct}</td><td>${a.ok?'✅':'❌'}</td></tr>`;});
t+='</table>';
document.getElementById('res-table').innerHTML=t;
}

function resetQuiz(){startQuiz();}
function goHome(){show('cover');}
</script>
