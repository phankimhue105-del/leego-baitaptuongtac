  <style>
        :root { --primary: #2563eb; --orange: #f97316; --green: #16a34a; --red: #dc2626; }
        body { font-family: 'DM Sans', sans-serif; margin: 0; }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #1e40af; color: white; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .fixed-footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: #1e40af; color: white; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .main-content { padding-top: 50px; padding-bottom: 50px; min-height: calc(100 * min(var(--vh, 1vh), 1vh)); }
        .btn-orange { background: var(--orange); color: white; padding: 14px 40px; border-radius: 12px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; transition: transform 0.1s; }
        .btn-orange:hover { transform: scale(1.03); }
        .btn-blue { background: var(--primary); color: white; padding: 14px 40px; border-radius: 12px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; transition: transform 0.1s; }
        .btn-blue:hover { transform: scale(1.03); }
        .choice-btn { background: white; border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px 20px; font-size: 16px; cursor: pointer; transition: all 0.2s; width: 100%; text-align: left; }
        .choice-btn:hover { border-color: var(--primary); background: #eff6ff; }
        .choice-btn.correct { border-color: var(--green); background: #dcfce7; }
        .choice-btn.incorrect { border-color: var(--red); background: #fee2e2; }
        .choice-btn.disabled { pointer-events: none; opacity: 0.7; }
        .word-btn { background: white; border: 2px solid var(--primary); border-radius: 10px; padding: 10px 16px; font-size: 16px; cursor: pointer; color: var(--primary); font-weight: 600; transition: all 0.15s; }
        .word-btn:hover { background: #dbeafe; }
        .word-btn.used { opacity: 0.3; pointer-events: none; }
        .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--orange); transition: width 0.4s; border-radius: 4px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .feedback-box { padding: 16px; border-radius: 12px; margin-top: 16px; font-size: 16px; }
        .feedback-box.correct { background: #dcfce7; border: 2px solid var(--green); }
        .feedback-box.incorrect { background: #fee2e2; border: 2px solid var(--red); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.3s ease-out; }
        @keyframes confettiFall { 0% { transform: translateY(-100%) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .confetti-piece { position: fixed; width: 10px; height: 10px; top: -10px; z-index: 200; animation: confettiFall 3s ease-out forwards; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 24px; max-width: 600px; margin: 0 auto; }

  <script>
const questions = [
    { part:1, type:'mc', illustration:'ruler', q:'What is it?', choices:['ruler','pencil','pen','notebook'], correct:0, explain:'Đáp án đúng là "ruler" vì tranh minh họa là một chiếc thước kẻ có các vạch chia và số đo rõ ràng trên thân thước. Đây là đồ dùng học tập dùng để đo độ dài và kẻ đường thẳng.' },
    { part:1, type:'mc', illustration:'backpack', q:'What is it?', choices:['backpack','chair','desk','pencil case'], correct:0, explain:'Đáp án đúng là "backpack" vì tranh minh họa là một chiếc cặp sách học sinh.' },
    { part:1, type:'mc', illustration:'circle', q:'Is it a circle?', choices:['Yes, it is.','No, it isn\'t.','It\'s a ruler.','It\'s a triangle.'], correct:0, explain:'Đây là hình tròn nên câu trả lời đúng là "Yes, it is."' },
    { part:1, type:'mc', illustration:'rectangle', q:'What shape is it?', choices:['square','triangle','rectangle','circle'], correct:2, explain:'Hình minh họa là hình chữ nhật nên đáp án đúng là "rectangle".' },
    { part:2, type:'build', words:['It','is','a','pen','.'], answer:'It is a pen.', explain:'Cấu trúc: It + is + a + pen. Dùng "It is..." để giới thiệu hoặc gọi tên một đồ vật.' },
    { part:2, type:'build', words:['What','is','it','?'], answer:'What is it?', explain:'"What is it?" dùng để hỏi tên của một đồ vật.' },
    { part:2, type:'build', words:['It','isn\'t','a','notebook','.'], answer:'It isn\'t a notebook.', explain:'"isn\'t" là dạng viết tắt của "is not", dùng để phủ định.' },
    { part:2, type:'build', words:['How','are','you','?'], answer:'How are you?', explain:'"How are you?" là câu hỏi dùng để hỏi thăm sức khỏe hoặc tình trạng của người khác.' },
    { part:3, type:'mc', q:'_____ is it?', choices:['Who','What','Where','When'], correct:1, explain:'Khi hỏi tên đồ vật, dùng "What is it?".' },
    { part:3, type:'mc', q:'It _____ a ruler.', choices:['am','is','are','be'], correct:1, explain:'"It" là chủ ngữ số ít nên dùng "is".' },
    { part:3, type:'mc', q:'Is it a square?', choices:['Yes, it is.','Yes, I am.','It is a square.','Thank you.'], correct:0, explain:'Câu hỏi Yes/No với "Is it...?" trả lời bằng: "Yes, it is." hoặc "No, it isn\'t."' },
    { part:3, type:'mc', q:'How are you?', choices:['I\'m fine. Thank you.','It\'s a pen.','Goodbye.','It\'s a circle.'], correct:0, explain:'Khi được hỏi "How are you?", câu trả lời lịch sự là: "I\'m fine. Thank you."' },
];

let current = 0, score = 0, answers = [];
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, dur, type='sine') {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
}

function playCorrectSound() { playTone(523, 0.15); setTimeout(()=>playTone(659, 0.15), 150); setTimeout(()=>playTone(784, 0.3), 300); }
function playIncorrectSound() { playTone(200, 0.3, 'sawtooth'); setTimeout(()=>playTone(150, 0.4, 'sawtooth'), 300); }
function playCelebration() { [0,200,400,600,800].forEach((d,i)=>setTimeout(()=>playTone(523+i*80,0.2),d)); }

function getSVG(name) {
    const svgs = {
        ruler: `<svg viewBox="0 0 220 100" width="180" height="100"><defs><linearGradient id="rulerFill" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" /><stop offset="50%" style="stop-color:#fef08a;stop-opacity:1" /><stop offset="100%" style="stop-color:#fde047;stop-opacity:1" /></linearGradient></defs><g><rect x="10" y="25" width="200" height="30" rx="6" fill="url(#rulerFill)" stroke="#1f2937" stroke-width="2.5" stroke-linejoin="round"/><rect x="10" y="27" width="200" height="2" fill="#d97706" opacity="0.6"/></g></svg>`,
        pencil: `<svg viewBox="0 0 120 120" width="140" height="140"><defs><linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" /><stop offset="100%" style="stop-color:#c99a5d;stop-opacity:1" /></linearGradient><linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fef08a;stop-opacity:1" /><stop offset="100%" style="stop-color:#facc15;stop-opacity:1" /></linearGradient></defs><g transform="translate(60,60) rotate(-35)"><polygon points="0,-45 3,-45 4,5 1,5" fill="url(#woodGrad)" stroke="#8b6914" stroke-width="1.5" stroke-linejoin="round"/><polygon points="3,-45 6,-45 5,5 4,5" fill="#cd8500" stroke="#8b6914" stroke-width="1.5" stroke-linejoin="round"/><polygon points="1,5 4,5 7,15 4,15" fill="#c0c0c0" stroke="#808080" stroke-width="1.5" stroke-linejoin="round"/><polygon points="4,5 7,5 8,15 7,15" fill="#e8e8e8" stroke="#808080" stroke-width="1.5" stroke-linejoin="round"/><rect x="1" y="15" width="6" height="25" fill="url(#yellowGrad)" stroke="#d4a500" stroke-width="2" stroke-linejoin="round"/><polygon points="0,15 1,15 4,10 7,15 8,15 7,16 1,16" fill="#e8d700" stroke="#d4a500" stroke-width="1.5" stroke-linejoin="round"/><polygon points="1,40 7,40 5,45 3,45" fill="#ec4899" stroke="#be185d" stroke-width="2" stroke-linejoin="round"/><polygon points="3,45 5,45 4,50" fill="#be185d" stroke="#831843" stroke-width="1.5" stroke-linejoin="round"/><polygon points="0,-45 3,-45 2,-50 -1,-50" fill="#1a1a1a" stroke="#000" stroke-width="1.5" stroke-linejoin="round"/><polygon points="3,-45 6,-45 5,-50 2,-50" fill="#0d0d0d" stroke="#000" stroke-width="1.5" stroke-linejoin="round"/></g></svg>`,
        backpack: `<svg viewBox="0 0 120 120" width="140" height="140"><rect x="30" y="35" width="60" height="70" fill="#3b82f6" stroke="#333" stroke-width="3" rx="10"/><rect x="40" y="55" width="40" height="25" fill="#60a5fa" stroke="#333" stroke-width="2" rx="5"/><path d="M45 35 Q50 20 60 20 Q70 20 75 35" fill="none" stroke="#333" stroke-width="4"/><rect x="55" y="45" width="10" height="8" fill="#1d4ed8" rx="2"/></svg>`,
        circle: `<svg viewBox="0 0 120 120" width="140" height="140"><circle cx="60" cy="60" r="45" fill="#ef4444" stroke="#333" stroke-width="3"/></svg>`,
        rectangle: `<svg viewBox="0 0 120 120" width="140" height="140"><rect x="15" y="35" width="90" height="50" fill="#22c55e" stroke="#333" stroke-width="3" rx="3"/></svg>`
    };
    return svgs[name] || '';
}

function checkPassword() {
    audioCtx.resume();
    if (document.getElementById('pw-input').value === '1379') {
        document.getElementById('pw-error').classList.add('hidden');
        showScreen('quiz-screen');
        renderQuestion();
    } else {
        document.getElementById('pw-error').classList.remove('hidden');
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function renderQuestion() {
    const q = questions[current];
    document.getElementById('q-number').textContent = `Câu ${current+1}/12`;
    document.getElementById('q-score').textContent = `Điểm: ${score}`;
    document.getElementById('progress-fill').style.width = `${(current/12)*100}%`;
    const area = document.getElementById('question-area');
    area.className = 'card pop-in';

    const partLabel = q.part === 1 ? 'PART 1: Vocabulary' : q.part === 2 ? 'PART 2: Build Sentence' : 'PART 3: Grammar';
    let html = `<p class="text-xs font-bold text-orange-500 uppercase mb-3">${partLabel}</p>`;

    if (q.type === 'mc') {
        if (q.illustration) html += `<div class="flex justify-center mb-4">${getSVG(q.illustration)}</div>`;
        html += `<p class="text-lg font-semibold mb-4">${q.q}</p>`;
        html += `<div class="space-y-3">`;
        q.choices.forEach((c, i) => {
            html += `<button class="choice-btn" onclick="selectMC(${i})" id="choice-${i}">${String.fromCharCode(65+i)}. ${c}</button>`;
        });
        html += `</div>`;
    } else {
        html += `<p class="text-lg font-semibold mb-4">Sắp xếp thành câu đúng:</p>`;
        html += `<div id="sentence-display" class="min-h-[48px] border-2 border-dashed border-gray-300 rounded-lg p-3 mb-4 text-lg font-semibold text-blue-800"></div>`;
        html += `<div id="word-bank" class="flex flex-wrap gap-2 mb-4">`;
        const shuffled = [...q.words].sort(() => Math.random() - 0.5);
        shuffled.forEach((w, i) => {
            html += `<button class="word-btn" onclick="selectWord(this)" data-word="${w}">${w}</button>`;
        });
        html += `</div>`;
        html += `<button class="text-sm text-gray-500 underline" onclick="resetBuild()">Reset</button>`;
    }
    html += `<div id="feedback-area"></div>`;
    area.innerHTML = html;
}

let builtWords = {};

function selectWord(btn) {
    btn.classList.add('used');
    if (!builtWords[current]) builtWords[current] = [];
    builtWords[current].push(btn.dataset.word);
    updateSentenceDisplay();

    const q = questions[current];
    if (builtWords[current].length === q.words.length) {
        const built = builtWords[current].reduce((s, w, i) => {
            if (i === 0) return w;
            if (w === '.' || w === '?') return s + w;
            return s + ' ' + w;
        }, '');
        const isCorrect = built === q.answer;
        showFeedback(isCorrect);
    }
}

function updateSentenceDisplay() {
    const display = document.getElementById('sentence-display');
    if (!builtWords[current]) {
        display.textContent = '';
        return;
    }
    let text = '';
    builtWords[current].forEach((w, i) => {
        if (i > 0 && w !== '.' && w !== '?') text += ' ';
        text += w;
    });
    display.textContent = text;
}

function resetBuild() {
    builtWords[current] = [];
    updateSentenceDisplay();
    document.querySelectorAll('#word-bank .word-btn').forEach(b => b.classList.remove('used'));
}

function selectMC(idx) {
    const q = questions[current];
    const isCorrect = idx === q.correct;
    document.querySelectorAll('.choice-btn').forEach((b, i) => {
        b.classList.add('disabled');
        if (i === q.correct) b.classList.add('correct');
        else if (i === idx && !isCorrect) b.classList.add('incorrect');
    });
    showFeedback(isCorrect);
}

function showFeedback(isCorrect) {
    if (isCorrect) { score++; playCorrectSound(); } else { playIncorrectSound(); }
    answers.push(isCorrect);
    document.getElementById('q-score').textContent = `Điểm: ${score}`;

    const q = questions[current];
    const fb = document.getElementById('feedback-area');
    fb.innerHTML = `
        <div class="feedback-box ${isCorrect ? 'correct' : 'incorrect'} pop-in">
            <p class="font-bold text-lg mb-1">${isCorrect ? '✅ Chính xác' : '❌ Chưa chính xác'}</p>
            <p class="text-sm text-gray-700">${q.explain}</p>
        </div>
        <div class="mt-4 text-center">
            <button class="btn-blue" onclick="nextQuestion()">➡ Câu tiếp theo</button>
        </div>
    `;
}

function nextQuestion() {
    current++;
    if (current >= 12) { showResult(); return; }
    renderQuestion();
}

function showResult() {
    document.getElementById('progress-fill').style.width = '100%';
    showScreen('result-screen');
    playCelebration();
    spawnConfetti();

    const pct = Math.round((score/12)*100);
    let perf = '';
    if (score === 12) perf = 'Xuất sắc!';
    else if (score >= 10) perf = 'Rất tốt!';
    else if (score >= 7) perf = 'Tốt!';
    else if (score >= 4) perf = 'Cần luyện thêm.';
    else perf = 'Hãy cố gắng nhé!';

    document.getElementById('result-score').textContent = `${score} / 12`;
    document.getElementById('result-percent').textContent = `${pct}%`;
    document.getElementById('result-performance').textContent = perf;

    let details = '<p class="font-semibold text-green-700 mb-1">✅ Câu đúng: ' + answers.map((a,i)=>a?`${i+1}`:'').filter(Boolean).join(', ') + '</p>';
    const wrong = answers.map((a,i)=>!a?`${i+1}`:'').filter(Boolean);
    if (wrong.length) details += '<p class="font-semibold text-red-700">❌ Câu sai: ' + wrong.join(', ') + '</p>';
    document.getElementById('result-details').innerHTML = details;
}

function spawnConfetti() {
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7'];
    for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random()*100 + '%';
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDelay = Math.random()*2 + 's';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    }
}

function resetQuiz() {
    current = 0; score = 0; answers = []; builtWords = {};
    document.getElementById('pw-input').value = '';
    showScreen('cover-screen');
}
</script>
