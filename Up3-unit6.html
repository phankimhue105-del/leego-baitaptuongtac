<!doctype html>
<html lang="vi">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeeGo English Quiz - Unit 6</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;family=Baloo+2:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    :root{
      --sky:#dff6ff;
      --mint:#dff7e8;
      --sun:#ffe88d;
      --ink:#21445d;
      --blue:#56b6d8;
      --blue-deep:#2b8fb4;
      --green:#4fb879;
      --green-soft:#e8f9ee;
      --red:#ef6a6a;
      --red-soft:#fff0f0;
      --cream:#fffdf7;
      --shadow:0 18px 45px rgba(37, 109, 139, .18);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Montserrat', sans-serif;
      color:var(--ink);
      min-height:100%;
      width:100%;
    }
    .page-wrap{
      width:100%;
      min-height:calc(100 * min(var(--vh, 1vh), 1vh));
      background:
        radial-gradient(circle at 10% 12%, rgba(255,255,255,.85) 0 10%, transparent 10.5%),
        radial-gradient(circle at 92% 18%, rgba(255,255,255,.65) 0 8%, transparent 8.5%),
        linear-gradient(180deg, #e8fbff 0%, #fefcf4 100%);
      position:relative;
      overflow:hidden;
    }
    .cloud{
      position:absolute;
      background:rgba(255,255,255,.68);
      border-radius:999px;
      filter:blur(.2px);
      z-index:0;
    }
    .cloud:before,.cloud:after{
      content:"";
      position:absolute;
      background:inherit;
      border-radius:50%;
    }
    .cloud.one{width:120px;height:34px;top:120px;left:6%}
    .cloud.one:before{width:42px;height:42px;left:20px;bottom:8px}
    .cloud.one:after{width:56px;height:56px;left:55px;bottom:4px}
    .cloud.two{width:150px;height:40px;top:180px;right:7%}
    .cloud.two:before{width:48px;height:48px;left:18px;bottom:8px}
    .cloud.two:after{width:64px;height:64px;left:67px;bottom:5px}
    .topbar{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:space-between;
      gap:16px;
      padding:16px 28px;
      font-size:13px;
      font-weight:700;
      color:#2f6d85;
    }
    .main-shell{
      position:relative;
      z-index:2;
      max-width:980px;
      margin:0 auto;
      padding:10px 20px 32px;
    }
    .hero{
      text-align:center;
      margin-bottom:20px;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:7px;
      background:#fff6c7;
      border:2px solid #ffe279;
      border-radius:999px;
      padding:7px 14px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#887132;
      margin-bottom:12px;
    }
    .hero h1{
      margin:0;
      font-family:'Baloo 2', cursive;
      font-size:48px;
      line-height:1;
      color:#247ea0;
      letter-spacing:.01em;
    }
    .hero p{
      margin:8px 0 0;
      font-size:16px;
      color:#628597;
      font-weight:600;
    }
    .quiz-card{
      background:rgba(255,255,255,.95);
      border:3px solid rgba(255,255,255,.95);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:22px;
      backdrop-filter:blur(8px);
    }
    .progress-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }
    .section-pill{
      display:inline-flex;
      align-items:center;
      gap:7px;
      border-radius:999px;
      padding:8px 13px;
      background:#e8f7ff;
      color:#247ea0;
      font-weight:800;
      font-size:12px;
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .count{
      font-size:14px;
      font-weight:800;
      color:#5e7d8c;
    }
    .progress-track{
      width:100%;
      height:11px;
      background:#e8f4f8;
      border-radius:999px;
      overflow:hidden;
      margin-bottom:22px;
    }
    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#60c5df,#74d38d);
      border-radius:999px;
      transition:width .35s ease;
    }
    .content-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:22px;
      align-items:stretch;
    }
    .hint-box{
      background:linear-gradient(135deg, #fff9e6 0%, #fffdf2 100%);
      border:2px solid #f0d779;
      border-radius:18px;
      padding:14px 16px;
      margin-bottom:8px;
    }
    .hint-label{
      display:flex;
      align-items:center;
      gap:7px;
      font-weight:800;
      font-size:13px;
      color:#c9a50b;
      text-transform:uppercase;
      letter-spacing:.05em;
      margin-bottom:6px;
    }
    .hint-content{
      margin:0;
      font-size:18px;
      line-height:1.65;
      color:#5b6246;
      font-weight:600;
    }
    .question-panel{
      display:flex;
      flex-direction:column;
      min-width:0;
    }
    .question-kicker{
      font-size:12px;
      font-weight:800;
      color:#73a4b6;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:8px;
    }
    .question-text{
      font-family:'Baloo 2', cursive;
      font-size:27px;
      line-height:1.25;
      font-weight:700;
      color:#23495f;
      margin:0 0 17px;
    }
    .options{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .option-btn{
      border:none;
      background:#f4fbfd;
      color:#244a60;
      border:2px solid #d7edf3;
      border-radius:16px;
      padding:13px 15px;
      text-align:left;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:11px;
      transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .option-btn:hover:not(:disabled){
      transform:translateY(-2px);
      border-color:#8ed2e7;
      box-shadow:0 8px 18px rgba(66, 154, 183, .12);
      background:#f8feff;
    }
    .option-btn:focus-visible,
    .next-btn:focus-visible,
    .restart-btn:focus-visible{
      outline:3px solid #ffd95c;
      outline-offset:3px;
    }
    .letter{
      flex:0 0 auto;
      width:29px;
      height:29px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:#dff5fb;
      color:#2f8dad;
      font-weight:800;
      font-size:13px;
    }
    .option-btn.correct{
      border-color:#7bcf95;
      background:#e9faef;
      color:#277243;
    }
    .option-btn.correct .letter{
      background:#73c98e;
      color:#fff;
    }
    .option-btn.wrong{
      border-color:#ef9999;
      background:#fff0f0;
      color:#b74a4a;
    }
    .option-btn.wrong .letter{
      background:#eb7a7a;
      color:#fff;
    }
    .option-btn:disabled{
      cursor:default;
    }
    .reading-box{
      background:#fff9dc;
      border:2px dashed #f0d779;
      padding:14px 16px;
      border-radius:18px;
      margin-bottom:16px;
      font-size:14px;
      line-height:1.65;
      color:#5b6246;
    }
    .feedback{
      margin-top:16px;
      border-radius:18px;
      padding:14px 15px 15px;
      display:none;
    }
    .feedback.show{display:block}
    .feedback.good{background:var(--green-soft); border:2px solid #bde9ca}
    .feedback.bad{background:var(--red-soft); border:2px solid #f3c6c6}
    .feedback-title{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:800;
      font-size:16px;
      margin-bottom:5px;
    }
    .feedback.good .feedback-title{color:#2d8c53}
    .feedback.bad .feedback-title{color:#c35050}
    .feedback-text{
      font-size:14px;
      line-height:1.55;
      color:#58707b;
      margin:0;
    }
    .next-wrap{
      display:flex;
      justify-content:flex-end;
      margin-top:14px;
    }
    .next-btn,.restart-btn{
      border:none;
      border-radius:999px;
      background:linear-gradient(90deg,#3bb0cf,#57c285);
      color:#fff;
      font-weight:800;
      padding:12px 20px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(57, 166, 171, .24);
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .next-btn:hover,.restart-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 24px rgba(57, 166, 171, .28);
    }
    .summary{
      display:none;
      text-align:center;
      padding:20px 8px 8px;
    }
    .summary.show{display:block}
    .summary-badge{
      width:92px;
      height:92px;
      margin:4px auto 14px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#fff4b8;
      color:#e4a80b;
      box-shadow:0 8px 22px rgba(231, 187, 55, .18);
    }
    .summary h2{
      font-family:'Baloo 2', cursive;
      font-size:34px;
      line-height:1.15;
      color:#267e9e;
      margin:0 0 8px;
    }
    .summary p{
      margin:0 0 16px;
      font-size:18px;
      font-weight:700;
      color:#56798a;
    }
    .score{
      display:inline-block;
      background:#ecfbf1;
      color:#31885a;
      border:2px solid #bce7cc;
      border-radius:18px;
      padding:11px 18px;
      font-family:'Baloo 2', cursive;
      font-size:29px;
      font-weight:800;
      margin-bottom:18px;
    }
    .footer{
      position:relative;
      z-index:2;
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#5f8ca0;
      padding:0 16px 18px;
    }
    .hidden{display:none !important}
    @media (max-width: 760px){
      .topbar{padding:13px 16px;font-size:11px}
      .hero h1{font-size:38px}
      .hero p{font-size:14px}
      .main-shell{padding:6px 14px 24px}
      .quiz-card{padding:17px;border-radius:23px}
      .content-grid{grid-template-columns:1fr;gap:17px}
      .visual-card,.visual-card img{min-height:220px}
      .question-text{font-size:24px}
      .topbar{align-items:flex-start}
    }
    @media (max-width: 480px){
      .topbar{flex-direction:column;gap:4px}
      .hero h1{font-size:33px}
      .question-text{font-size:22px}
      .option-btn{font-size:14px;padding:11px 12px}
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root">
  <div class="page-wrap">
   <div class="cloud one"></div>
   <div class="cloud two"></div>
   <header class="topbar">
    <div data-template-id="brand-left" class="canva-text"></div>

      <div class="progress-head">
       <div id="sectionPill" class="section-pill"><i data-lucide="book-open" style="width:15px;height:15px;"></i> <span id="sectionText"></span>

        </div>

       </div>
       <div class="question-panel">
        <div id="questionKicker" class="question-kicker"></div>
        <div id="readingBox" class="reading-box hidden">
         Hi, I am Lucy. I live on a farm. In the morning, I always (11)____ the chickens. My brother, Ben, (12)____ the cows at 6:00 A.M. Before school, we (13)____ eggs together. After school, I usually (14)____ vegetables in the garden. We (15)____ help our parents with the farm chores.
        </div>
        <h2 id="questionText" class="question-text"></h2>
        <div id="options" class="options"></div>

         </div>

      </div>
     </div>

  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    const questions = [
      {
        section:'PART 1 • VOCABULARY',
        kicker:'Read the hint and choose',
        text:'What do you do?',
        hint:'You put the blanket and pillow in the right place.',
        options:['do laundry','make my bed','set the table','clean my room'],
        correct:1,
        explanation:'"Make my bed" có nghĩa là dọn giường, sắp xếp chăn và gối gọn gàng.',
        speak:true
      },
      {
        section:'PART 1 • VOCABULARY',
        kicker:'Read the hint and choose',
        text:'What do you do?',
        hint:'You use a broom to clean the floor.',
        options:['sweep the floor','wash the car','water the plants','take out the garbage'],
        correct:0,
        explanation:'"Sweep the floor" có nghĩa là dùng chổi để quét sàn nhà.',
        speak:true
      },
      {
        section:'PART 1 • VOCABULARY',
        kicker:'Read the hint and choose',
        text:'What do you do?',
        hint:'The flowers need water.',
        options:['vacuum the carpet','clean the bathroom','water the plants','walk the dog'],
        correct:2,
        explanation:'"Water the plants" có nghĩa là tưới nước cho cây.',
        speak:true
      },
      {
        section:'PART 1 • VOCABULARY',
        kicker:'Read the hint and choose',
        text:'What do you do?',
        hint:'You take eggs from the chickens.',
        options:['milk the cows','collect eggs','feed the chickens','pick vegetables'],
        correct:1,
        explanation:'"Collect eggs" có nghĩa là nhặt hoặc thu hoạch trứng từ chuồng gà.',
        speak:true
      },
      {
        section:'PART 1 • VOCABULARY',
        kicker:'Read the hint and choose',
        text:'What do you do?',
        hint:'The plates and bowls are dirty.',
        options:['wash the dishes','do laundry','set the table','sweep the floor'],
        correct:0,
        explanation:'"Wash the dishes" có nghĩa là rửa bát đĩa sau khi ăn.',
        speak:true
      },
      {
        section:'PART 2 • GRAMMAR',
        kicker:'Choose the best answer',
        text:'When ____ she make her bed? - She makes her bed before school.',
        options:['do','doing','does','is'],
        correct:2,
        explanation:'Với chủ ngữ là "she" (ngôi thứ 3 số ít), ta phải mượn trợ động từ "does" trong câu hỏi thì hiện tại đơn.'
      },
      {
        section:'PART 2 • GRAMMAR',
        kicker:'Choose the best answer',
        text:'He always ____ the carpet in the afternoon.',
        options:['vacuum','vacuums','vacuuming','to vacuum'],
        correct:1,
        explanation:'Với chủ ngữ là "He", động từ "vacuum" thường phải thêm đuôi "-s" thành "vacuums" ở thì hiện tại đơn.'
      },
      {
        section:'PART 2 • GRAMMAR',
        kicker:'Choose the best answer',
        text:'What are ____ chores? - She usually sweeps the floor.',
        options:['her','his','your','my'],
        correct:0,
        explanation:'Câu trả lời nhắc đến "She" (cô ấy), nên câu hỏi phải dùng tính từ sở hữu tương ứng là "her" (của cô ấy).'
      },
      {
        section:'PART 2 • GRAMMAR',
        kicker:'Choose the best answer',
        text:'I usually pick vegetables ____ school. (Sau giờ học)',
        options:['before','at','on','after'],
        correct:3,
        explanation:'"After school" có nghĩa là sau giờ học ở trường. Bạn nhỏ nhặt rau sau khi đi học về.'
      },
      {
        section:'PART 2 • GRAMMAR',
        kicker:'Choose the best answer',
        text:'What are his chores? - He ____ takes out the garbage. (0% - Không bao giờ)',
        options:['always','usually','sometimes','never'],
        correct:3,
        explanation:'Trạng từ "never" có nghĩa là không bao giờ làm việc đó (tương ứng với 0 ô màu).'
      },
      {
        section:'PART 3 • READING',
        kicker:'Read and choose',
        text:'In the morning, I always (11)____ the chickens.',
        options:['feed','milk','wash','clean'],
        correct:0,
        explanation:'Ta có cụm từ "feed the chickens" có nghĩa là cho gà ăn.'
      },
      {
        section:'PART 3 • READING',
        kicker:'Read and choose',
        text:'My brother, Ben, (12)____ the cows at 6:00 A.M.',
        options:['milk','milks','milking','to milk'],
        correct:1,
        explanation:'"Ben" là tên riêng số ít (tương đương He), nên động từ "milk" (vắt sữa) phải thêm "-s" thành "milks".'
      },
      {
        section:'PART 3 • READING',
        kicker:'Read and choose',
        text:'Before school, we (13)____ eggs together.',
        options:['pick','sweep','collect','do'],
        correct:2,
        explanation:'Cụm từ "collect eggs" có nghĩa là đi nhặt trứng/thu gom trứng gà.'
      },
      {
        section:'PART 3 • READING',
        kicker:'Read and choose',
        text:'After school, I usually (14)____ vegetables in the garden.',
        options:['pick','wash','vacuum','set'],
        correct:0,
        explanation:'Cụm từ "pick vegetables" có nghĩa là hái rau, hái nông sản trong vườn.'
      },
      {
        section:'PART 3 • READING',
        kicker:'Read and choose',
        text:'We (15)____ help our parents with the farm chores. (Luôn luôn - 100%)',
        options:['never','always','sometimes','usually'],
        correct:1,
        explanation:'"Always" (luôn luôn) thể hiện hành động giúp đỡ bố mẹ được lặp lại đều đặn mỗi ngày.'
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;
    let audioCtx;

    const sectionText = document.getElementById('sectionText');
    const questionCount = document.getElementById('questionCount');
    const progressFill = document.getElementById('progressFill');
    const questionKicker = document.getElementById('questionKicker');
    const questionText = document.getElementById('questionText');
    const optionsWrap = document.getElementById('options');
    const feedback = document.getElementById('feedback');
    const feedbackTitle = document.getElementById('feedbackTitle');
    const feedbackText = document.getElementById('feedbackText');
    const nextBtn = document.getElementById('nextBtn');
    const readingBox = document.getElementById('readingBox');
    const hintBox = document.getElementById('hintBox');
    const hintText = document.getElementById('hintText');
    const quizView = document.getElementById('quizView');
    const summaryView = document.getElementById('summaryView');
    const scoreText = document.getElementById('scoreText');
    const restartBtn = document.getElementById('restartBtn');

    function ensureAudio(){
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tone(freq, start, duration, type='sine', gainValue=.08){
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(gainValue, start + .02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + duration + .03);
    }

    function playCorrect(){
      ensureAudio();
      const now = audioCtx.currentTime;
      tone(523.25, now, .22, 'sine', .07);
      tone(659.25, now + .18, .22, 'sine', .07);
      tone(783.99, now + .36, .35, 'sine', .08);
      tone(1046.5, now + .62, .55, 'triangle', .07);
    }

    function playWrong(){
      ensureAudio();
      const now = audioCtx.currentTime;
      tone(180, now, .28, 'sawtooth', .04);
      tone(150, now + .22, .34, 'sawtooth', .035);
      tone(120, now + .5, .45, 'triangle', .025);
    }

    function playFanfare(){
      ensureAudio();
      const now = audioCtx.currentTime;
      const notes = [523.25,659.25,783.99,1046.5,783.99,1046.5,1318.5];
      notes.forEach((n,i)=>tone(n, now + i*.24, .28, i>3?'triangle':'sine', .07));
      tone(1567.98, now + 1.7, .8, 'triangle', .08);
    }

    function speak(text){
      if(!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.rate = .82;
      utter.pitch = 1.18;
      window.speechSynthesis.speak(utter);
    }

    function renderQuestion(){
      answered = false;
      const q = questions[current];
      sectionText.textContent = q.section;
      questionCount.textContent = `Question ${current + 1} / ${questions.length}`;
      progressFill.style.width = `${((current + 1) / questions.length) * 100}%`;
      questionKicker.textContent = q.kicker;
      questionText.textContent = q.text;
      feedback.className = 'feedback';
      feedbackTitle.innerHTML = '';
      feedbackText.textContent = '';

      const isReading = current >= 10;
      const hasHint = current < 5;
      readingBox.classList.toggle('hidden', !isReading);
      hintBox.classList.toggle('hidden', !hasHint);
      if(hasHint) hintText.textContent = q.hint;

      optionsWrap.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
        btn.addEventListener('click', () => chooseAnswer(i, btn));
        optionsWrap.appendChild(btn);
      });

      lucide.createIcons();
    }

    function chooseAnswer(index){
      if(answered) return;
      answered = true;
      const q = questions[current];

      if(q.speak) speak(q.options[index]);

      const buttons = [...document.querySelectorAll('.option-btn')];
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if(i === q.correct) btn.classList.add('correct');
        if(i === index && i !== q.correct) btn.classList.add('wrong');
      });

      const isCorrect = index === q.correct;
      if(isCorrect){
        score++;
        playCorrect();
        feedback.className = 'feedback show good';
        feedbackTitle.innerHTML = '<i data-lucide="check-circle-2" style="width:19px;height:19px;"></i><span>Chính xác!</span>';
      }else{
        playWrong();
        feedback.className = 'feedback show bad';
        feedbackTitle.innerHTML = '<i data-lucide="x-circle" style="width:19px;height:19px;"></i><span>Chưa chính xác!</span>';
      }
      feedbackText.textContent = q.explanation;
      lucide.createIcons();
    }

    nextBtn.addEventListener('click', () => {
      if(current < questions.length - 1){
        current++;
        renderQuestion();
      }else{
        showSummary();
      }
    });

    function showSummary(){
      quizView.classList.add('hidden');
      summaryView.classList.add('show');
      scoreText.textContent = `${score} / 15`;
      playFanfare();
      lucide.createIcons();
    }

    restartBtn.addEventListener('click', () => {
      current = 0;
      score = 0;
      summaryView.classList.remove('show');
      quizView.classList.remove('hidden');
      renderQuestion();
    });

    renderQuestion();
    lucide.createIcons();
  </script>
