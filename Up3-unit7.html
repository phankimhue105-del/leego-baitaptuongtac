  <title>Unit 7 Out and About Quiz</title>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Fraunces:opsz,wght@9..144,600;9..144,700&amp;display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#17324d;
      --sky:#dff6ff;
      --blue:#58b8e8;
      --blue-deep:#2d8fc0;
      --yellow:#ffd86b;
      --green:#32b67a;
      --red:#ef6b72;
      --paper:#fffefb;
      --muted:#6c8093;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'DM Sans',sans-serif;
      color:var(--ink);
      width:100%;
      min-height:100%;
      overflow-x:hidden;
    }
    .full-height-wrapper{
      min-height:calc(100 * min(var(--vh, 1vh), 1vh));
      display:flex;
      flex-direction:column;
    }
    .header-footer-bar{
      width:100%;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(255,255,255,.65);
      padding:12px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      color:#2d8fc0;
      font-size:13px;
      font-weight:700;
    }
    .footer-bar{
      border-top:1px solid rgba(255,255,255,.65);
      border-bottom:none;
    }
    .page-wrap{
      width:100%;
      flex:1;
      position:relative;
      overflow:hidden;
      padding:28px;
    }
    .page-wrap::before,
    .page-wrap::after{
      content:"";
      position:absolute;
      border-radius:999px;
      pointer-events:none;
      opacity:.42;
      filter:blur(2px);
    }
    .page-wrap::before{
      width:330px;height:330px;background:#fff;top:-120px;left:-80px;
    }
    .page-wrap::after{
      width:260px;height:260px;background:#b9ecff;right:-80px;bottom:-90px;
    }
    .star{
      position:absolute;
      color:#fff;
      opacity:.75;
      font-size:24px;
      animation:twinkle 3.2s ease-in-out infinite;
      pointer-events:none;
    }
    .star:nth-child(1){top:10%;left:8%;animation-delay:.2s}
    .star:nth-child(2){top:19%;right:12%;animation-delay:1.1s}
    .star:nth-child(3){bottom:16%;left:12%;animation-delay:1.8s}
    .star:nth-child(4){bottom:26%;right:8%;animation-delay:.7s}
    @keyframes twinkle{
      0%,100%{transform:scale(1) rotate(0deg);opacity:.4}
      50%{transform:scale(1.22) rotate(12deg);opacity:.9}
    }
    .app-shell{
      position:relative;
      z-index:2;
      width:100%;
      max-width:920px;
      margin:0 auto;
    }
    .hero{text-align:center;margin-bottom:20px;animation:rise .65s ease both}
    .subject-pill{
      display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;
      box-shadow:0 8px 18px rgba(31,111,148,.12);font-size:13px;font-weight:700;
      letter-spacing:.05em;text-transform:uppercase;
    }
    .hero h1{margin:12px 0 6px;font-family:'Fraunces',serif;line-height:1.08}
    .hero p{margin:0 auto;max-width:560px;line-height:1.55}
    .progress-shell{
      background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.8);backdrop-filter:blur(8px);
      border-radius:22px;padding:15px 18px;margin:0 auto 18px;box-shadow:0 10px 30px rgba(41,128,168,.09);
      animation:rise .65s .08s ease both;
    }
    .progress-top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:10px}
    .progress-note{font-size:13px;color:#5f7b90;font-weight:700}
    .progress-track{width:100%;height:11px;border-radius:999px;background:#e7f4f8;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.04)}
    .progress-fill{height:100%;width:6.66%;border-radius:999px;background:linear-gradient(90deg,#55b7e8,#71d5df);transition:width .45s ease}
    .quiz-card,.summary-card{border-radius:30px;padding:28px;box-shadow:0 18px 40px rgba(33,104,136,.14);border:1px solid rgba(255,255,255,.8);animation:rise .65s .14s ease both}
    .question-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
    .question-badge{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
    .question-icon{width:42px;height:42px;display:grid;place-items:center;border-radius:14px;background:#fff5d4;color:#d39a14}
    .question-text{margin:0 0 20px;line-height:1.35;font-family:'Fraunces',serif}
    .reading-panel{display:none;margin-bottom:20px;padding:18px 20px;border-radius:20px;border:1px solid #dcecf2;background:#f4fbfe;box-shadow:0 8px 20px rgba(65,130,157,.08)}
    .reading-panel.show{display:block}
    .reading-copy{margin:0;color:#4f6f85;line-height:1.65;font-size:15px}
    .question-image-wrap{margin:0 0 20px;border-radius:22px;overflow:hidden;background:#eef8fc;border:1px solid #d9edf4;box-shadow:0 10px 24px rgba(65,130,157,.11)}
    .question-illustration{display:none;width:100%;height:260px;background:#f7fcff}
    .question-illustration.show{display:block}
    .question-illustration svg{width:100%;height:100%;display:block}
    .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .option-btn{width:100%;border:2px solid #dcecf2;border-radius:18px;background:#fff;color:var(--ink);text-align:left;padding:16px;display:flex;align-items:center;gap:12px;min-height:68px;cursor:pointer;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease,background .2s ease;font-weight:700}
    .option-btn:hover:not(:disabled){transform:translateY(-2px);border-color:#8bd4ef;box-shadow:0 10px 20px rgba(82,159,194,.12)}
    .option-btn:focus-visible,.next-btn:focus-visible,.restart-btn:focus-visible{outline:4px solid rgba(255,216,107,.8);outline-offset:3px}
    .option-letter{width:34px;height:34px;display:grid;place-items:center;flex:0 0 34px;border-radius:11px;background:#edf8fc;color:#348eb8;font-size:14px;font-weight:800}
    .option-btn.correct{border-color:#63c99d;background:#f0fff7;box-shadow:0 8px 18px rgba(50,182,122,.14)}
    .option-btn.correct .option-letter{background:#dff8eb;color:#1e8e5e}
    .option-btn.wrong{border-color:#f2a1a6;background:#fff5f5;box-shadow:0 8px 18px rgba(239,107,114,.12)}
    .option-btn.wrong .option-letter{background:#ffe3e5;color:#d5535c}
    .option-btn:disabled{cursor:default}
    .feedback{margin-top:18px;border-radius:20px;padding:16px;display:none;align-items:flex-start;gap:12px;border:1px solid #e4eef2}
    .feedback.show{display:flex}
    .feedback-badge{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}
    .feedback-badge.good{background:#dcf7e9;color:#1e8a5c}
    .feedback-badge.bad{background:#ffe4e6;color:#cf4e57}
    .feedback-copy{font-size:14px;line-height:1.55;margin-top:1px}
    .actions{margin-top:20px;display:flex;justify-content:flex-end}
    .next-btn,.restart-btn{border:none;border-radius:16px;padding:14px 18px;display:none;align-items:center;gap:8px;cursor:pointer;font-weight:800;box-shadow:0 10px 20px rgba(45,143,192,.2);transition:transform .2s ease,box-shadow .2s ease}
    .next-btn.show{display:inline-flex}
    .next-btn:hover,.restart-btn:hover{transform:translateY(-2px);box-shadow:0 14px 24px rgba(45,143,192,.24)}
    .summary-card{display:none;text-align:center;padding:40px 30px}
    .summary-card.show{display:block}
    .summary-emoji{width:78px;height:78px;border-radius:24px;margin:0 auto 14px;display:grid;place-items:center;background:#fff3c7;color:#c89210}
    .summary-kicker{text-transform:uppercase;letter-spacing:.08em;font-size:12px;font-weight:800;margin-bottom:8px}
    .score{font-family:'Fraunces',serif;margin:0 0 8px;line-height:1.1;font-size:2.3rem}
    .summary-message{max-width:440px;margin:0 auto 24px;line-height:1.55}
    .restart-btn{display:inline-flex;margin:auto}
    @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @media (max-width:700px){
      .page-wrap{padding:18px}
      .quiz-card,.summary-card{padding:22px;border-radius:24px}
      .options-grid{grid-template-columns:1fr}
      .hero h1{font-size:2.1rem}
      .feedback{flex-direction:column}
      .actions{justify-content:stretch}
      .next-btn{justify-content:center;width:100%}
      .question-illustration{height:220px}
      .header-footer-bar{padding:10px 16px;font-size:12px}
    }
    @media (max-width:520px){
      .header-footer-bar{align-items:flex-start;flex-direction:column;gap:4px}
    }
  </style>

  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>

  <script>
    const readingText = "Yesterday was Sunday. I (11)______ at the flower shop with my mom. My brothers (12)______ there. They were at the (13)______ to buy some comic books. In the afternoon, we were all at the (14)______. The water was great! We love (15)______.";

    const questions = [
      { section:"Từ vựng", question:"What place is this?", options:["beach","museum","hotel","aquarium"], answer:0, explanation:"'Beach' là bãi biển.", imageIndex:0 },
      { section:"Từ vựng", question:"What place is this?", options:["pool","aquarium","amusement park","bookstore"], answer:1, explanation:"'Aquarium' là thủy cung (nơi nuôi cá và sinh vật biển).", imageIndex:1 },
      { section:"Từ vựng", question:"What place is this?", options:["hair salon","toy store","amusement park","beach"], answer:2, explanation:"'Amusement park' là công viên giải trí/công viên trò chơi.", imageIndex:2 },
      { section:"Từ vựng", question:"What place is this?", options:["pharmacy","bookstore","coffee shop","flower shop"], answer:0, explanation:"'Pharmacy' là nhà thuốc/tiệm thuốc tây.", imageIndex:3 },
      { section:"Từ vựng", question:"What place is this?", options:["flower shop","hair salon","museum","toy store"], answer:3, explanation:"'Toy store' là cửa hàng bán đồ chơi trẻ em.", imageIndex:4 },
      { section:"Ngữ pháp", question:"Where ______ he yesterday? - He was at the beach.", options:["was","were","is","are"], answer:0, explanation:"Chủ ngữ số ít 'he' đi với động từ to-be quá khứ là 'was'." },
      { section:"Ngữ pháp", question:"Where were they yesterday? - They ______ at the amusement park.", options:["was","are","were","wasn't"], answer:2, explanation:"Chủ ngữ số nhiều 'they' đi với động từ to-be quá khứ là 'were'." },
      { section:"Ngữ pháp", question:"Was she at the museum yesterday? - No, she ______.", options:["wasn't","weren't","was","isn't"], answer:0, explanation:"Câu trả lời phủ định 'No, she...' phải đi với 'wasn't' (was not)." },
      { section:"Ngữ pháp", question:"______ they at the bookstore yesterday? - Yes, they were.", options:["Was","Were","Are","Is"], answer:1, explanation:"Câu hỏi số nhiều với 'they' trong quá khứ phải đảo 'Were' lên đầu câu." },
      { section:"Ngữ pháp", question:"Where ______ you yesterday? - I was at the coffee shop.", options:["was","were","am","are"], answer:1, explanation:"Đi với chủ ngữ 'you' trong câu hỏi quá khứ luôn dùng 'Were' (Where were you?)." },
      { section:"Đọc hiểu", question:"Choose the best word for blank (11).", options:["was","were","am","are"], answer:0, explanation:"Chủ ngữ 'I' (tôi) đi với 'was' trong quá khứ.", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (12).", options:["wasn't","weren't","was","are"], answer:1, explanation:"'My brothers' là số nhiều (các anh em trai) nên câu phủ định dùng 'weren't'.", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (13).", options:["bookstore","hair salon","pharmacy","hotel"], answer:0, explanation:"Đến để mua truyện tranh (comic books) thì chỉ có thể là 'bookstore' (hiệu sách).", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (14).", options:["museum","pool","coffee shop","hair salon"], answer:1, explanation:"Vế sau có 'The water was great' (nước rất tuyệt) nên địa điểm phù hợp là 'pool' (bể bơi).", reading:true },
      { section:"Đọc hiểu", question:"Choose the best word for blank (15).", options:["yesterday","Sunday","chores","places to go"], answer:1, explanation:"'We love Sunday' nghĩa là chúng tôi yêu ngày Chủ Nhật (vì được đi chơi nhiều nơi).", reading:true }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const progressLabel = document.getElementById('progressLabel');
    const progressFill = document.getElementById('progressFill');
    const questionLabel = document.getElementById('questionLabel');
    const questionText = document.getElementById('questionText');
    const optionButtons = [0,1,2,3].map(i => document.getElementById('option' + i));
    const feedback = document.getElementById('feedback');
    const feedbackBadge = document.getElementById('feedbackBadge');
    const feedbackText = document.getElementById('feedbackText');
    const nextButton = document.getElementById('nextButton');
    const quizCard = document.getElementById('quizCard');
    const summaryCard = document.getElementById('summaryCard');
    const scoreText = document.getElementById('scoreText');
    const summaryMessage = document.getElementById('summaryMessage');
    const restartButton = document.getElementById('restartButton');
    const imageWrap = document.getElementById('imageWrap');
    const illustrations = Array.from(document.querySelectorAll('.question-illustration'));
    const readingPanel = document.getElementById('readingPanel');
    document.querySelector('[data-template-id="reading-copy"]').textContent = readingText;

    function playFeedbackTone(type){
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if(!AudioContext) return;
      const ctx = new AudioContext();
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.05);
      gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 2);
      const notes = type === 'success'
        ? [{f:523.25,t:0,d:.22},{f:659.25,t:.28,d:.22},{f:783.99,t:.56,d:.28},{f:1046.5,t:.9,d:.45}]
        : [{f:246.94,t:0,d:.3},{f:220,t:.4,d:.35},{f:196,t:.9,d:.4},{f:174.61,t:1.45,d:.45}];
      notes.forEach(n=>{
        const osc = ctx.createOscillator();
        osc.type = type === 'success' ? 'sine' : 'triangle';
        osc.frequency.setValueAtTime(n.f, ctx.currentTime+n.t);
        osc.connect(gain);
        osc.start(ctx.currentTime+n.t);
        osc.stop(ctx.currentTime+n.t+n.d);
      });
      setTimeout(()=>ctx.close(),2100);
    }

    function playFinalCelebration(){
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if(!AudioContext) return;
      const ctx = new AudioContext();
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.08);
      gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 3);
      const notes = [
        {f:523.25,t:0,d:.18},{f:659.25,t:.2,d:.18},{f:783.99,t:.4,d:.2},
        {f:1046.5,t:.68,d:.35},{f:880,t:1.1,d:.18},{f:1046.5,t:1.32,d:.2},
        {f:1174.66,t:1.58,d:.25},{f:1318.51,t:1.92,d:.55}
      ];
      notes.forEach(n=>{
        const osc = ctx.createOscillator();
        osc.type='sine';
        osc.frequency.setValueAtTime(n.f, ctx.currentTime+n.t);
        osc.connect(gain);
        osc.start(ctx.currentTime+n.t);
        osc.stop(ctx.currentTime+n.t+n.d);
      });
      setTimeout(()=>ctx.close(),3100);
    }

    function renderQuestion(){
      answered = false;
      const q = questions[current];

      progressLabel.textContent = `Câu hỏi ${current + 1} trên ${questions.length}`;
      questionLabel.textContent = `${q.section} • Câu ${current + 1}`;
      questionText.textContent = q.question;
      progressFill.style.width = `${((current + 1) / questions.length) * 100}%`;

      optionButtons.forEach((btn, i) => {
        btn.disabled = false;
        btn.classList.remove('correct','wrong');
        btn.querySelector('.option-copy').textContent = q.options[i];
      });

      illustrations.forEach(el => el.classList.remove('show'));
      if(typeof q.imageIndex === 'number'){
        imageWrap.style.display = 'block';
        illustrations[q.imageIndex].classList.add('show');
      }else{
        imageWrap.style.display = 'none';
      }

      if(q.reading){ readingPanel.classList.add('show'); }
      else{ readingPanel.classList.remove('show'); }

      feedback.classList.remove('show');
      feedbackBadge.className = 'feedback-badge';
      feedbackBadge.textContent = '';
      feedbackText.textContent = '';
      nextButton.classList.remove('show');
    }

    function handleAnswer(index){
      if(answered) return;
      answered = true;
      const q = questions[current];
      const isCorrect = index === q.answer;
      if(isCorrect) score++;

      optionButtons.forEach((btn, i) => {
        btn.disabled = true;
        if(i === q.answer) btn.classList.add('correct');
        if(i === index && i !== q.answer) btn.classList.add('wrong');
      });

      feedback.classList.add('show');
      feedbackBadge.classList.add(isCorrect ? 'good' : 'bad');
      feedbackBadge.innerHTML = isCorrect
        ? '<i data-lucide="check-circle-2" style="width:15px;height:15px;"></i> Chính xác'
        : '<i data-lucide="x-circle" style="width:15px;height:15px;"></i> Chưa chính xác';
      feedbackText.textContent = `${isCorrect ? 'Chính xác! ' : 'Chưa chính xác! '}${q.explanation}`;
      nextButton.classList.add('show');
      playFeedbackTone(isCorrect ? 'success' : 'error');
      lucide.createIcons();
    }

    function showSummary(){
      quizCard.style.display = 'none';
      document.querySelector('.progress-shell').style.display = 'none';
      summaryCard.classList.add('show');
      scoreText.textContent = `Kết quả tổng hợp của bạn: ${score}/${questions.length} câu đúng!`;
      summaryMessage.textContent = score >= 12 ? 'Xuất sắc quá!' : 'Cố gắng luyện tập thêm nhé!';
      playFinalCelebration();
    }

    function nextQuestion(){
      current++;
      if(current >= questions.length) showSummary();
      else renderQuestion();
    }

    function restartQuiz(){
      current = 0;
      score = 0;
      quizCard.style.display = 'block';
      document.querySelector('.progress-shell').style.display = 'block';
      summaryCard.classList.remove('show');
      renderQuestion();
    }

    optionButtons.forEach((btn, i) => btn.addEventListener('click', () => handleAnswer(i)));
    nextButton.addEventListener('click', nextQuestion);
    restartButton.addEventListener('click', restartQuiz);

    renderQuestion();
    lucide.createIcons();
  </script>
